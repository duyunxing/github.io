<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>既有房屋抗震鉴定智能辅助系统 Pro v5.9</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #f0f4f8 0%, #e8ecf1 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 20px;
            color: #1e293b;
            line-height: 1.6;
        }
        .container { max-width: 1400px; margin: 0 auto; }

        /* ===== 头部 ===== */
        .header {
            background: linear-gradient(135deg, #0f2b3d, #1a4a6f 55%, #2563eb);
            color: white; padding: 28px 36px;
            border-radius: 24px; margin-bottom: 24px;
            box-shadow: 0 16px 40px rgba(0,0,0,.18);
        }
        .header h1 { font-size: 2rem; font-weight: 700; margin-bottom: 8px; }
        .header p  { opacity: .88; font-size: .92rem; margin-bottom: 4px; }
        .ver-badge {
            display: inline-block; background: rgba(255,255,255,.18);
            padding: 3px 12px; border-radius: 20px;
            font-size: .78rem; font-weight: 600; margin-top: 10px;
        }

        /* 紧凑表格内联编辑 */
        .quick-edit-input {
            width: 100%; padding: 4px 6px;
            border: 2px solid #2563eb; border-radius: 4px;
            font-size: .82rem;
        }

        /* 耐久性折叠区块 */
        .dur-section-header {
            display: flex; align-items: center; gap: 10px;
            padding: 12px 14px; border-radius: 10px;
            cursor: pointer; transition: all .2s;
            margin-bottom: 0;
        }
        .dur-section-header.open { background: #fef3c7; border: 2px solid #f59e0b; }
        .dur-section-header.closed { background: #f1f5f9; border: 2px solid #e2e8f0; }
        .dur-section-header:hover { border-color: #94a3b8; }
        .dur-section-body {
            padding: 14px 0 0;
            border: 1.5px solid #e2e8f0;
            border-top: none;
            border-radius: 0 0 10px 10px;
            background: white;
        }
        .dur-badge {
            display: inline-block; padding: 2px 8px; border-radius: 10px;
            font-size: .7rem; font-weight: 700;
        }
        .dur-badge.yes { background: #fef3c7; color: #92400e; }
        .dur-badge.no { background: #f1f5f9; color: #94a3b8; }

        /* 构件级耐久性汇总表 */
        .dur-summary-table { width: 100%; border-collapse: collapse; font-size: .82rem; }
        .dur-summary-table th { background: #f1f5f9; padding: 8px 10px; text-align: left; border-bottom: 2px solid #e2e8f0; font-weight: 600; }
        .dur-summary-table td { padding: 7px 10px; border-bottom: 1px solid #f1f5f9; }
        .dur-summary-table tr:hover { background: #f8fafc; }
        .dur-grade-A { color: #065f46; font-weight: 700; }
        .dur-grade-B { color: #1d4ed8; font-weight: 700; }
        .dur-grade-C { color: #b45309; font-weight: 700; }
        .dur-grade-D { color: #991b1b; font-weight: 700; }

        /* ===== 步骤导航 ===== */
        .steps {
            display: flex; flex-wrap: wrap; gap: 10px;
            margin-bottom: 24px; background: white;
            padding: 14px 18px; border-radius: 14px;
            box-shadow: 0 4px 12px rgba(0,0,0,.06);
        }
        .step-btn {
            background: #e2e8f0; border: 2px solid transparent;
            padding: 9px 18px; border-radius: 40px; font-weight: 600;
            cursor: pointer; font-size: .88rem; transition: all .25s;
            color: #1e293b; white-space: nowrap;
        }
        .step-btn:hover { background: #cbd5e1; }
        .step-btn.active  { background: #2563eb; color: white; box-shadow: 0 4px 12px rgba(37,99,235,.3); }
        .step-btn.completed { background: #10b981; color: white; }

        /* ===== 卡片 ===== */
        .card {
            background: white; border-radius: 18px; padding: 28px 32px;
            margin-bottom: 24px; box-shadow: 0 6px 20px rgba(0,0,0,.07);
            border-top: 4px solid #2563eb;
        }
        .card h2 { font-size: 1.6rem; margin-bottom: 20px; color: #0f2b3d; }
        .card h3 {
            font-size: 1.1rem; margin: 22px 0 14px; color: #1e293b;
            border-bottom: 2px solid #e2e8f0; padding-bottom: 6px;
        }
        .card h4 { font-size: .95rem; margin: 16px 0 8px; color: #334155; }

        /* ===== 表单 ===== */
        .form-row {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 18px; margin-bottom: 16px;
        }
        .field { display: flex; flex-direction: column; gap: 5px; }
        .field label {
            font-weight: 600; font-size: .8rem;
            text-transform: uppercase; letter-spacing: .4px; color: #4a627a;
        }
        .field small { font-size: .73rem; color: #64748b; text-transform: none; font-weight: 400; }
        input, select, textarea {
            padding: 9px 12px; border: 2px solid #e2e8f0;
            border-radius: 9px; font-size: .92rem; transition: all .2s;
            background: #fefefe; font-family: inherit;
        }
        input:focus, select:focus, textarea:focus {
            outline: none; border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,.12);
        }
        textarea { resize: vertical; min-height: 120px; }

        /* ===== 按钮 ===== */
        button { font-family: inherit; }
        .btn-primary {
            background: linear-gradient(135deg, #2563eb, #1e40af); color: white;
            border: none; padding: 11px 26px; border-radius: 10px;
            font-weight: 700; cursor: pointer; font-size: .95rem; transition: all .25s;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 18px rgba(37,99,235,.3); }
        .btn-primary:active { transform: translateY(0); }
        .btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; }
        .btn-secondary {
            background: #e2e8f0; border: 2px solid #cbd5e1; color: #1e293b;
            padding: 9px 22px; border-radius: 10px; font-weight: 600;
            cursor: pointer; transition: all .2s; font-size: .92rem;
        }
        .btn-secondary:hover { background: #cbd5e1; }
        .btn-danger {
            background: #fee2e2; border: 2px solid #fca5a5; color: #991b1b;
            padding: 7px 16px; border-radius: 8px; font-weight: 600;
            cursor: pointer; font-size: .85rem; transition: all .2s;
        }
        .btn-danger:hover { background: #fca5a5; }
        .btn-sm { padding: 7px 16px; font-size: .85rem; }
        .btn-group { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
        .btn-group-right { display: flex; gap: 12px; margin-top: 20px; justify-content: flex-end; flex-wrap: wrap; }

        /* ===== 标签页 ===== */
        .tab-btn {
            padding: 10px 20px; border: none; background: none; cursor: pointer;
            font-weight: 600; font-size: .9rem; color: #64748b;
            border-bottom: 3px solid transparent; margin-bottom: -2px;
            transition: all .2s; border-radius: 6px 6px 0 0;
        }
        .tab-btn:hover { color: #1e293b; background: #f1f5f9; }
        .tab-btn.active { color: #2563eb; border-bottom-color: #2563eb; background: #eff6ff; }

        /* ===== 确认框 ===== */
        .confirm-box {
            padding: 14px 16px; background: #fef9c3; border: 2px solid #fde047;
            border-radius: 12px; margin: 10px 0; font-size: .88rem;
        }

        /* ===== 提示面板 ===== */
        .panel {
            padding: 12px 16px; border-radius: 10px; margin: 10px 0;
            font-size: .88rem; line-height: 1.7;
        }
        .panel.success { background: #d1fae5; border: 1px solid #6ee7b7; color: #065f46; }
        .panel.warning { background: #fef9c3; border: 1px solid #fde047; color: #713f12; }
        .panel.danger  { background: #fee2e2; border: 1px solid #fca5a5; color: #991b1b; }
        .panel.info    { background: #dbeafe; border: 1px solid #93c5fd; color: #1e3a5f; }
        .panel strong  { font-weight: 700; }

        /* ===== 进度条 ===== */
        .progress-wrap { margin: 14px 0; }
        .progress-bar { background: #e2e8f0; height: 10px; border-radius: 20px; overflow: hidden; }
        .progress-fill {
            background: linear-gradient(90deg, #2563eb, #10b981);
            height: 100%; border-radius: 20px; transition: width .4s;
        }
        .progress-label { font-size: .8rem; color: #64748b; margin-bottom: 4px; }

        /* ===== AI 模型选择 ===== */
        .model-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 9px; margin-bottom: 18px;
        }
        .model-item {
            display: block; padding: 11px 10px; background: #f1f5f9;
            border: 2px solid #e2e8f0; border-radius: 10px;
            text-align: center; font-weight: 600; font-size: .86rem;
            cursor: pointer; transition: all .2s; user-select: none;
        }
        .model-item:hover { border-color: #93c5fd; }
        .model-item.selected { background: #dbeafe; border-color: #2563eb; color: #1e40af; }

        /* ===== 加载动画 ===== */
        .spinner {
            display: inline-block; width: 14px; height: 14px;
            border: 3px solid #c7d9ff; border-top-color: #2563eb;
            border-radius: 50%; animation: spin .7s linear infinite;
            vertical-align: middle; margin-right: 5px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none !important; }

        /* ===== 报告框 ===== */
        .report-box {
            background: #fefce8; border: 2px solid #fcd34d;
            border-radius: 12px; padding: 20px 24px;
            font-family: 'Courier New', monospace; white-space: pre-wrap;
            line-height: 1.65; max-height: 600px; overflow-y: auto;
            color: #3a3a00; font-size: .86rem;
        }
        .report-box-wide {
            background: #fefce8; border: 2px solid #fcd34d;
            border-radius: 12px; padding: 20px 24px;
            white-space: pre-wrap; line-height: 1.8;
            max-height: 650px; overflow-y: auto; font-size: .88rem;
            color: #1e293b;
        }

        /* ===== 构件数量设置 ===== */
        .comp-type-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 14px; margin: 14px 0;
        }
        .comp-type-card {
            border: 2px solid #e2e8f0; border-radius: 12px; padding: 14px 16px;
            transition: all .25s; background: #f8fafc;
        }
        .comp-type-card.active { border-color: #2563eb; background: #eff6ff; }
        .comp-type-card h4 { margin-bottom: 8px; font-size: .92rem; }
        .count-row { display: flex; align-items: center; gap: 10px; }
        .count-input { width: 80px; text-align: center; padding: 6px; }
        .count-badge {
            background: #2563eb; color: white; border-radius: 20px;
            padding: 2px 10px; font-size: .78rem; font-weight: 700;
        }
        .summary-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 16px; background: linear-gradient(135deg, #eff6ff, #dbeafe);
            border: 2px solid #93c5fd; border-radius: 12px; margin-top: 14px;
            font-weight: 700; color: #1e40af; font-size: .9rem;
        }

        /* ===== 逐根录入 ===== */
        .comp-section { margin-bottom: 22px; }
        .comp-section-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 16px; background: #f1f5f9; border-radius: 12px;
            cursor: pointer; border: 2px solid #e2e8f0; margin-bottom: 8px;
        }
        .comp-section-header:hover { background: #e2e8f0; }
        .comp-section-header.open { border-color: #2563eb; background: #eff6ff; }
        .comp-sec-title { font-weight: 700; font-size: .9rem; }
        .comp-sec-meta { font-size: .8rem; color: #64748b; margin-top: 2px; }
        .comp-sec-actions { display: flex; gap: 8px; }
        .comp-sec-actions button { font-size: .75rem; padding: 4px 10px; }
        .comp-items-list { padding: 8px 0; }
        .comp-item-card {
            border: 1.5px solid #e2e8f0; border-radius: 10px; margin-bottom: 8px;
            overflow: hidden; transition: all .2s;
        }
        .comp-item-card.filled { border-color: #10b981; background: #f0fdf4; }
        .comp-item-card.open   { border-color: #2563eb; box-shadow: 0 4px 12px rgba(37,99,235,.15); }
        .comp-item-header {
            display: flex; align-items: center; gap: 10px; padding: 10px 14px;
            cursor: pointer; font-size: .88rem; font-weight: 600;
        }
        .comp-item-header:hover { background: rgba(0,0,0,.03); }
        .item-dot {
            width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
            background: #e2e8f0; border: 2px solid #cbd5e1;
        }
        .item-dot.filled { background: #10b981; border-color: #10b981; }
        .comp-item-body {
            padding: 14px 16px 8px; display: none;
            border-top: 1px solid #f1f5f9;
        }
        .comp-item-body.open { display: block; }
        .comp-item-row {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px; margin-bottom: 10px;
        }
        .comp-item-name-edit {
            font-size: .88rem; border: 1.5px solid #e2e8f0; border-radius: 7px;
            padding: 6px 10px; width: 100%; font-weight: 600;
        }
        .comp-item-name-edit:focus { border-color: #2563eb; }

        /* ===== 紧凑表格视图 ===== */
        .compact-section { margin-bottom: 16px; }
        .compact-header {
            padding: 10px 14px;
            background: linear-gradient(135deg, #f8fafc, #f1f5f9);
            border-radius: 10px;
            border: 1.5px solid #e2e8f0;
        }
        .compact-header:hover { border-color: #2563eb; }
        .flex-center { display: flex; align-items: center; }
        .comp-icon { font-size: 1.2rem; }
        .comp-name { font-weight: 700; font-size: .9rem; }
        .comp-count { font-size: .8rem; color: #64748b; }
        .expand-icon { font-size: .7rem; color: #94a3b8; transition: transform .2s; }
        .compact-header.open .expand-icon { transform: rotate(180deg); }
        
        /* 进度环 */
        .progress-ring-container { position: relative; width: 32px; height: 32px; }
        .progress-ring { transform: rotate(-90deg); }
        .progress-ring-bg { fill: none; stroke: #e2e8f0; stroke-width: 3; }
        .progress-ring-fill { fill: none; stroke: #f59e0b; stroke-width: 3; stroke-linecap: round; transition: stroke-dasharray .3s; }
        .progress-ring-fill.complete { stroke: #10b981; }
        .progress-percent { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: .6rem; font-weight: 700; }
        .progress-text { font-size: .75rem; color: #64748b; min-width: 28px; text-align: center; }
        
        /* 紧凑表格 */
        .comp-table-container { padding: 0; max-height: 400px; overflow-y: auto; }
        .compact-table { display: table; width: 100%; border-collapse: collapse; font-size: .82rem; }
        .compact-table-row { display: table-row; border-bottom: 1px solid #f1f5f9; }
        .compact-table-row.header { background: #f8fafc; font-weight: 600; color: #475569; }
        .compact-table-row.header > .td { padding: 8px 6px; border-bottom: 2px solid #e2e8f0; }
        .compact-table-row:not(.header) { transition: background .15s; }
        .compact-table-row:not(.header):hover { background: #f8fafc; }
        .compact-table-row.filled-row { background: #f0fdf4; }
        .compact-table-row.filled-row:hover { background: #dcfce7; }
        
        .td { display: table-cell; padding: 6px 6px; vertical-align: middle; }
        .td-status { width: 40px; text-align: center; }
        .td-name { width: 80px; }
        .td-field { max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }
        .td-field:hover { background: #e2e8f0; border-radius: 4px; }
        .td-images { width: 60px; text-align: center; }
        .td-actions { width: 60px; text-align: center; }
        
        .mini-progress { width: 24px; height: 4px; background: #e2e8f0; border-radius: 2px; overflow: hidden; }
        .mini-progress-fill { height: 100%; background: #10b981; transition: width .3s; }
        
        .item-label-badge {
            display: inline-block; padding: 2px 8px; background: #f1f5f9;
            border-radius: 12px; font-size: .75rem; font-weight: 600;
        }
        .item-label-badge.filled { background: #10b981; color: white; }
        
        .field-value { color: #94a3b8; }
        .field-value.has-value { color: #1e293b; font-weight: 500; }
        
        .img-btn {
            padding: 3px 8px; background: #f1f5f9; border: 1px solid #e2e8f0;
            border-radius: 6px; cursor: pointer; font-size: .75rem;
        }
        .img-btn:hover { background: #e2e8f0; }
        .img-count { font-weight: 600; }
        
        .btn-action { padding: 4px 6px; background: transparent; border: none; cursor: pointer; font-size: .9rem; opacity: .6; transition: opacity .15s; }
        .btn-action:hover { opacity: 1; }
        .btn-action.delete:hover { color: #ef4444; }
        
        /* 编辑器弹窗 */
        .item-editor-modal {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            z-index: 1000; background: rgba(0,0,0,.5);
            justify-content: center; align-items: flex-start;
            padding: 20px; overflow-y: auto;
        }
        .editor-content {
            background: white; border-radius: 16px; width: 100%; max-width: 800px;
            margin: 0 auto; max-height: calc(100vh - 40px); overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,.3);
        }
        .editor-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 20px; background: linear-gradient(135deg, #0f2b3d, #1a4a6f);
            color: white; border-radius: 16px 16px 0 0;
        }
        .editor-header h3 { margin: 0; font-size: 1.1rem; }
        .editor-close { background: transparent; border: none; color: white; font-size: 1.5rem; cursor: pointer; opacity: .7; }
        .editor-close:hover { opacity: 1; }
        .editor-body { padding: 20px; }
        .editor-footer { padding: 16px 20px; border-top: 1px solid #e2e8f0; display: flex; justify-content: flex-end; gap: 12px; }
        
        /* 图片网格 */
        .editor-images { margin-bottom: 20px; }
        .editor-images h4 { margin-bottom: 10px; font-size: .9rem; }
        .img-badge { background: #2563eb; color: white; padding: 2px 8px; border-radius: 10px; font-size: .7rem; margin-left: 6px; }
        .image-grid { display: flex; flex-wrap: wrap; gap: 10px; }
        .image-thumb { position: relative; width: 80px; height: 80px; border-radius: 8px; overflow: hidden; border: 2px solid #e2e8f0; cursor: pointer; }
        .image-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .image-thumb:hover { border-color: #2563eb; }
        .img-remove { position: absolute; top: 2px; right: 2px; width: 18px; height: 18px; background: rgba(0,0,0,.6); color: white; border: none; border-radius: 50%; cursor: pointer; font-size: .7rem; line-height: 1; }
        .image-upload-btn { width: 80px; height: 80px; border: 2px dashed #cbd5e1; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #94a3b8; font-size: .75rem; }
        .image-upload-btn:hover { border-color: #2563eb; color: #2563eb; }
        
        .btn-ai-analyze { width: 100%; padding: 10px; background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; margin-top: 10px; }
        .btn-ai-analyze:hover { opacity: .9; }
        
        .ai-result-box { margin-top: 12px; }
        .ai-result { padding: 16px; }
        .ai-result h4 { margin-bottom: 12px; color: #1e40af; }
        .crack-result-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 8px; margin-bottom: 12px; }
        .crack-result-item { background: #f8fafc; padding: 8px; border-radius: 6px; }
        .crack-result-item label { display: block; font-size: .7rem; color: #64748b; margin-bottom: 2px; }
        .crack-result-item span { font-weight: 600; font-size: .85rem; }
        .crack-result-item .damage-轻微 { color: #10b981; }
        .crack-result-item .damage-中等 { color: #f59e0b; }
        .crack-result-item .damage-严重 { color: #ef4444; }
        .crack-suggestion { background: #fef9c3; padding: 10px; border-radius: 6px; margin-bottom: 12px; }
        .crack-suggestion label { font-weight: 600; font-size: .8rem; }
        .crack-suggestion p { margin: 4px 0 0; font-size: .85rem; }
        .btn-apply { padding: 8px 16px; background: #10b981; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .btn-apply:hover { background: #059669; }
        
        /* 设计文件上传 */
        .design-upload-btn { 
            display:inline-flex; flex-direction:column; align-items:center; justify-content:center;
            width:100px; height:100px; border:2px dashed #0ea5e9; border-radius:12px; 
            background:#f0f9ff; color:#0284c7; cursor:pointer; font-size:.8rem; text-align:center;
            transition:all .2s;
        }
        .design-upload-btn:hover { background:#e0f2fe; border-color:#0284c7; }
        .design-file-item {
            display:flex; align-items:center; gap:8px; padding:8px 12px;
            background:#fff; border:1px solid #e2e8f0; border-radius:8px; font-size:.8rem;
        }
        .design-file-item .file-icon { font-size:1.2rem; }
        .design-file-item .file-name { max-width:120px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .design-file-item .file-remove { 
            background:none; border:none; color:#94a3b8; cursor:pointer; font-size:1rem; padding:0 4px;
        }
        .design-file-item .file-remove:hover { color:#ef4444; }
        
        /* 原始设计信息区域 */
        .orig-design-section {

        renderCompSetup,  // 2 现场检测（构件设置+数据录入）

/* AI 设置保存函数（全局统一） */
function saveAiSettings() {
    var inputModel = v('f_ai_model');
    var inputUrl   = v('f_api_url').trim();
    var inputKey   = v('f_api_key').trim();

    if (inputModel) S.aiModel = inputModel;
    if (inputKey)   S.apiKey  = inputKey;

    // 根据选择的模型设置默认 API URL（仅当用户未手动填写时）
    if (!inputUrl) {
        if (S.aiModel === 'deepseek-v3.1' || S.aiModel === 'deepseek-r1') {
            S.apiUrl = 'https://api.deepseek.com/v1/chat/completions';
        } else if (S.aiModel === 'qwen-3.5') {
            S.apiUrl = 'https://api-dashscope.aliyuncs.com/compatible-mode/v1/chat/completions';
        } else if (S.aiModel === 'gpt-4o') {
            S.apiUrl = 'https://api.openai.com/v1/chat/completions';
        } else {
            S.apiUrl = S.apiUrl || '';
        }
    } else {
        S.apiUrl = inputUrl;
    }

    alert('✅ AI 设置已保存！');
    // 更新页面上的状态显示
    renderInfo();
}

/* 检查 AI 是否已配置，未配置则提醒 */

    if (!S.apiKey || S.apiKey.trim() === '') {

    }

}

/* 生成构件数据录入的 HTML - 紧凑表格视图 */
function generateCompDataHtml() {
    var html = '';
    for (var k in COMPS) {
        var c = COMPS[k];
        var list = S.compLists[k];
        if (!list || list.length === 0) continue;
        var filledCount = list.filter(isItemFilled).length;
        var total = list.length;
        var percent = Math.round(filledCount / total * 100);
        var fields = COMP_FIELDS[k];
        
        // 紧凑模式下只显示关键字段（取前3个）
        var keyFields = fields.slice(0, 3);
        
        html +=
        '<div class="comp-section compact-section" id="cs_' + k + '">' +
          '<div class="comp-section-header compact-header" onclick="toggleSection(\'' + escJS(k) + '\')" id="csh_' + escJS(k) + '">' +
            '<div class="flex-center" style="gap:8px;">' +
              '<span class="comp-icon">' + c.icon + '</span>' +
              '<span class="comp-name">' + c.name + '</span>' +
              '<span class="comp-count">(' + total + c.unit + ')</span>' +
            '</div>' +
            '<div class="flex-center" style="gap:12px;">' +
              '<div class="progress-ring-container">' +
                '<svg class="progress-ring" width="32" height="32"><circle class="progress-ring-bg" cx="16" cy="16" r="13"/><circle class="progress-ring-fill' + (percent === 100 ? ' complete' : '') + '" cx="16" cy="16" r="13" stroke-dasharray="' + (percent * 0.816) + ' 81.6"/></svg>' +
                '<span class="progress-percent">' + percent + '%</span>' +
              '</div>' +
              '<span class="progress-text">' + filledCount + '/' + total + '</span>' +
              '<span class="expand-icon" id="ei_' + k + '">▼</span>' +
            '</div>' +
          '</div>' +
          '<div class="comp-table-container" id="csb_' + k + '">';
        
        // 紧凑表格视图
        html += '<div class="compact-table-wrapper">';
        // 表头
        html += '<div class="compact-table">' +
          '<div class="compact-table-row header">' +
            '<div class="td td-status">状态</div>' +
            '<div class="td td-name">编号</div>';
        for (var fi = 0; fi < keyFields.length; fi++) {
            var f = keyFields[fi];
            html += '<div class="td td-field">' + f.label + '</div>';
        }
        html += '<div class="td td-images">图片</div><div class="td td-actions">操作</div></div>';
        
        // 数据行
        for (var i = 0; i < list.length; i++) {
            var item = list[i];
            var isFilled = isItemFilled(item);
            var filledRatio = getFilledRatio(item, fields);
            var imgCount = (item.images || []).length;
            
            html += '<div class="compact-table-row' + (isFilled ? ' filled-row' : '') + '" id="ctr_' + item.id + '">' +
                '<div class="td td-status">' +
                  '<div class="mini-progress"><div class="mini-progress-fill" style="width:' + (filledRatio * 100) + '%"></div></div>' +
                '</div>' +
                '<div class="td td-name"><span class="item-label-badge' + (isFilled ? ' filled' : '') + '">' + esc(item.label) + '</span></div>';
            
            for (var fi = 0; fi < keyFields.length; fi++) {
                var f = keyFields[fi];
                var val = item.data[f.id] || '';
                var displayVal = val.length > 12 ? val.substring(0, 10) + '..' : val;
                html += '<div class="td td-field" onclick="quickEdit(\'' + escJS(k) + '\',' + i + ',\'' + escJS(f.id) + '\',event); event.stopPropagation();">' +
                    '<span class="field-value' + (val ? ' has-value' : '') + '" title="' + esc(val) + '">' + (displayVal || '-') + '</span>' +
                '</div>';
            }
            
            // 图片列
            html += '<div class="td td-images">' +
                '<button class="img-btn" onclick="showImageUpload(\'' + escJS(k) + '\',' + i + ')" title="上传/查看图片">' +
                  '📷 <span class="img-count">' + imgCount + '</span>' +
                '</button>' +
            '</div>';
            
            // 操作列

// 获取字段填充比例
function getFilledRatio(item, fields) {
    if (!item.data) return 0;
    var filled = 0;
    for (var fi = 0; fi < fields.length; fi++) {
        var f = fields[fi];
        if (item.data[f.id] && item.data[f.id].trim()) filled++;
    }
    return filled / fields.length;
}

// 快速编辑字段 - 改用内联输入
function quickEdit(k, idx, fieldId, event) {
    if (event) event.stopPropagation();
    var item = S.compLists[k][idx];
    var fields = COMP_FIELDS[k];
    var field = fields.find(function(f) { return f.id === fieldId; });
    var currentVal = item.data[fieldId] || '';
    var cell = event ? event.currentTarget : null;
    
    // 创建内联输入框
    var input = document.createElement('input');
    input.type = 'text';
    input.value = currentVal;
    input.className = 'quick-edit-input';
    input.placeholder = field.ph || '';
    input.style.cssText = 'width:100%;padding:4px 6px;border:2px solid #2563eb;border-radius:4px;font-size:.82rem;';
    
    // 保存按钮
    var saveBtn = function() {
        item.data[fieldId] = input.value;
        renderCompSetup();
    };
    
    // 取消/保存事件
    input.onblur = saveBtn;
    input.onkeydown = function(e) {
        if (e.key === 'Enter') { input.blur(); }
        if (e.key === 'Escape') { renderCompSetup(); }
    };
    
    // 替换单元格内容
    if (cell) {
        cell.innerHTML = '';
        cell.appendChild(input);
        input.focus();
        input.select();
    }
}

// 折叠/展开耐久性检测区
function toggleDurSection(itemId) {
    var section = document.getElementById('durSection_' + itemId);
    var header = section ? section.previousElementSibling : null;
    var chk = document.getElementById('durChk_' + itemId);
    if (!section || !header) return;
    var isVisible = section.style.display !== 'none';
    section.style.display = isVisible ? 'none' : 'block';
    if (chk) {
        chk.checked = !isVisible;
    }
    // 更新标题样式和文字
    if (header.style) {
        header.style.background = isVisible ? '#f1f5f9' : '#fef3c7';
        header.style.borderColor = isVisible ? '#e2e8f0' : '#f59e0b';
    }
    var spans = header.querySelectorAll ? header.querySelectorAll('span') : [];
    if (spans[2]) spans[2].textContent = isVisible ? '点击展开 ►' : '已启用 ▼';
    var durKeyMap = {};
    var allLists = S.compLists;
    var found = false;
    for (var kk in allLists) {
        for (var ii = 0; ii < allLists[kk].length; ii++) {
            if (allLists[kk][ii].id === itemId) {
                allLists[kk][ii].data = allLists[kk][ii].data || {};
                var key = (kk === 'brick_wall' ? 'bw' : kk === 'conc_col' ? 'cc' : kk === 'conc_beam' ? 'cb' : 'cs') + '_hasDur';
                allLists[kk][ii].data[key] = !isVisible ? '是' : '否';
                found = true; break;
            }
        }
        if (found) break;
    }
}

// 切换抗震构造措施字段显示（根据选择的类型）
function toggleSeismicFields(k, idx, type) {
    var types = ['圈梁', '构造柱', '纵横墙连接', '拉结筋', '楼梯间', '整体性'];
    for (var i = 0; i < types.length; i++) {
        var group = document.getElementById('sd_group_' + types[i] + '_' + idx);
        if (group) {
            group.style.display = (types[i] === type) ? 'block' : 'none';
        }
    }
    // 保存类型到数据
    var item = S.compLists[k][idx];
    if (item && item.data) {
        item.data['sd_type'] = type;
    }
}

// 关闭编辑器
function closeItemEditor(k, idx) {
    var item = S.compLists[k][idx];
    var modal = document.getElementById('editor_' + item.id);
    if (modal) modal.style.display = 'none';
}

// 保存编辑器
function saveItemEditor(k, idx) {
    var item = S.compLists[k][idx];
    var fields = COMP_FIELDS[k];
    item.data = item.data || {};
    for (var fi = 0; fi < fields.length; fi++) {
        var f = fields[fi];
        var inp = document.getElementById('ef_' + f.id + '_' + idx);
        if (inp) {
            item.data[f.id] = inp.value;
        }
    }
    // 处理 hasDur checkbox（替代 text input）
    var durToggleMap = { brick_wall:'bw', conc_col:'cc', conc_beam:'cb', conc_slab:'cs' };
    var durKey = durToggleMap[k];
    if (durKey) {
        var chkId = 'durChk_' + item.id;
        var chkEl = document.getElementById(chkId);
        if (chkEl) {
            item.data[durKey + '_hasDur'] = chkEl.checked ? '是' : '否';
        }
    }
    closeItemEditor(k, idx);
    renderCompSetup();
}

// 触发图片上传
function triggerImageUpload(k, idx) {
    var item = S.compLists[k][idx];
    var inp = document.getElementById('ifu_' + item.id);
    if (inp) inp.click();
}

// 处理图片上传
function handleImageUpload(k, idx, input) {
    if (!input.files || input.files.length === 0) return;
    var item = S.compLists[k][idx];
    if (!item.images) item.images = [];
    
    for (var i = 0; i < input.files.length; i++) {
        var file = input.files[i];
        var reader = new FileReader();
        reader.onload = (function(f, item) {
            return function(e) {
                item.images.push({
                    name: f.name,
                    url: e.target.result,
                    uploadedAt: new Date().toISOString()
                });
                // 刷新编辑器显示
                openItemEditor(k, idx);
            };
        })(file, item);
        reader.readAsDataURL(file);
    }
}

// 显示图片上传面板
function showImageUpload(k, idx) {
    openItemEditor(k, idx);
}

    var win = window.open('', '_blank');

    win.document.close();
}

function removeImage(event, k, idx, imgIdx) {
    event.stopPropagation();

// AI裂缝分析
async function analyzeCracks(k, idx) {
    var item = S.compLists[k][idx];
    var resultBox = document.getElementById('aiResult_' + item.id);
    if (!item.images || item.images.length === 0) {
        resultBox.style.display = 'block';
        resultBox.innerHTML = '<div class="panel warning">请先上传裂缝照片，再进行 AI 分析。</div>';
        return;
    }
    
    if (!S.apiKey || S.apiKey.trim() === '') {
        resultBox.style.display = 'block';
        resultBox.innerHTML = '<div class="panel warning"><strong>⚠️ AI 尚未配置</strong><br>请先前往「①基本信息」页面配置 AI API Key。</div>';
        return;
    }
    
    resultBox.style.display = 'block';

// 解析 AI 返回结果
function parseCrackAIResult(text) {
    var result = {
        crack_type: '待分析',
        crack_pattern: '待分析',
        max_width: '待分析',
        crack_length: '待分析',
        crack_depth: '待分析',
        development_trend: '待分析',
        damage_level: '待分析',
        suggestion: '待分析'
    };
    
    // 尝试 JSON 解析
    var jsonMatch = text.match(/\{[\s\S]*\}/);
    if (jsonMatch) {
        try {
            var parsed = JSON.parse(jsonMatch[0]);
            Object.assign(result, parsed);
        } catch (e) {
            // 尝试文本解析
            extractField(text, 'crack_type', result);
            extractField(text, 'crack_pattern', result);
            extractField(text, 'max_width', result);
            extractField(text, 'crack_length', result);
            extractField(text, 'crack_depth', result);
            extractField(text, 'development_trend', result);
            extractField(text, 'damage_level', result);
            extractField(text, 'suggestion', result);
        }
    }
    
    return result;
}

// 提取字段
function extractField(text, key, result) {
    var patterns = [
        new RegExp(key + '[^:\\n]*[:：]\\s*([^\\n]+)', 'i'),
        new RegExp('"' + key + '"\\s*:\\s*"([^"]+)"', 'i'),
        new RegExp('"' + key + '"\\s*:\\s*([^,}]+)', 'i')
    ];
    for (var i = 0; i < patterns.length; i++) {
        var m = text.match(patterns[i]);
        if (m) {
            result[key] = m[1].trim();
            break;
        }
    }
}

// 采纳 AI 分析结果
function applyCrackResult(k, idx, crackInfo) {
    var item = S.compLists[k][idx];
    var fields = COMP_FIELDS[k];
    var prefix = k === 'brick_wall' ? 'bw' : k === 'conc_col' ? 'cc' : k === 'conc_beam' ? 'cb' : k === 'conc_slab' ? 'cs' : k === 'masonry_fill' ? 'mf' : 'fd';
    
    // 自动填充相关字段
    if (crackInfo.crack_pattern && item.data[prefix + '_crackP'] === '') {
        item.data[prefix + '_crackP'] = crackInfo.crack_pattern;
    }
    if (crackInfo.max_width && item.data[prefix + '_crackW'] === '') {
        item.data[prefix + '_crackW'] = crackInfo.max_width.replace(/[^0-9.]/g, '');
    }
    if (crackInfo.crack_length && item.data[prefix + '_crackL'] === '') {
        item.data[prefix + '_crackL'] = crackInfo.crack_length.replace(/[^0-9.]/g, '');
    }
    if (crackInfo.development_trend && item.data[prefix + '_crackDev']) {
        item.data[prefix + '_crackDev'] = crackInfo.development_trend;
    }
    
    // 保存分析结果到备注
    item.aiAnalysis = JSON.stringify(crackInfo);
    
    alert('✅ 已采纳 AI 分析结果！请检查自动填充的数据是否需要调整。');
    closeItemEditor(k, idx);
    renderCompSetup();
}

        for (var i = 0; i < oldList.length; i++) {

function renderDur() {
    var d = S.dur;

    var age = new Date().getFullYear() - year; // 建筑使用年龄（年）
    
    // 汇总构件级耐久性数据
    var compDurList = gatherCompDurability();
    var durCount = compDurList.length;
    var worstCarb = null, worstChlor = null, worstRust = null;
    var carbVals = [], chlorVals = [], rustVals = [];
    
    for (var i = 0; i < compDurList.length; i++) {
        var cd = compDurList[i];
        if (cd.carbD !== null && cd.carbD !== '') {
            var cv = parseFloat(cd.carbD);
            carbVals.push(cv);
            if (!worstCarb || cv > worstCarb.val) worstCarb = { val: cv, label: cd.label };
        }
        if (cd.chloride !== null && cd.chloride !== '') {
            var clv = parseFloat(cd.chloride);
            chlorVals.push(clv);
            if (!worstChlor || clv > worstChlor.val) worstChlor = { val: clv, label: cd.label };
        }
        if (cd.rustPot !== null && cd.rustPot !== '') {
            var rp = parseFloat(cd.rustPot);
            rustVals.push(rp);
            if (!worstRust || rp < worstRust.val) worstRust = { val: rp, label: cd.label };
        }
    }
    
    var avgCarb = carbVals.length ? (carbVals.reduce(function(a,b){return a+b;},0) / carbVals.length).toFixed(1) : null;
    var avgChlor = chlorVals.length ? (chlorVals.reduce(function(a,b){return a+b;},0) / chlorVals.length).toFixed(3) : null;
    var minRustPot = rustVals.length ? Math.min.apply(null, rustVals).toFixed(0) : null;
    
    // 自动建议
    var suggestCarb = avgCarb !== null ? avgCarb : d.carbonDepth;
    var suggestChlor = avgChlor !== null ? avgChlor : d.chloride;

          (minRustPot !== null ? ' 最低锈蚀电位 <strong>' + minRustPot + ' mV</strong>' : '') +

          '<thead><tr style="background:#f1f5f9;">' +
            '<th style="padding:8px 10px;text-align:left;">构件</th>' +

            '<th style="padding:8px 10px;">渗水pH</th>' +

// 汇总所有构件的耐久性数据
function gatherCompDurability() {
    var result = [];
    var durTypes = [
        { key:'brick_wall',   icon:'🧱', getCarb:'bw_mortarD', getCl:'bw_chloride',   getRp:null,          getPh:null,       getRust:'bw_efflor',  getAlkali:null, getRating:'bw_durNote' },
        { key:'conc_col',     icon:'🏛️', getCarb:'cc_carbD',   getCl:'cc_chloride',   getRp:'cc_rustPot', getPh:'cc_phValue', getRust:'cc_rust',    getAlkali:'cc_alkali', getRating:'cc_durNote' },
        { key:'conc_beam',    icon:'📐', getCarb:'cb_carbD',   getCl:'cb_chloride',   getRp:'cb_rustPot', getPh:'cb_phValue', getRust:'cb_rust',    getAlkali:'cb_alkali', getRating:'cb_durNote' },
        { key:'conc_slab',    icon:'⬛', getCarb:'cs_carbD',   getCl:'cs_chloride',   getRp:'cs_rustPot', getPh:'cs_phValue', getRust:'cs_damp',    getAlkali:'cs_alkali', getRating:'cs_durNote' }
    ];
    for (var ti = 0; ti < durTypes.length; ti++) {
        var t = durTypes[ti];
        var list = S.compLists[t.key] || [];
        for (var i = 0; i < list.length; i++) {
            var item = list[i];
            var d = item.data || {};
            // 检查是否有耐久性数据（只要有任意一项即纳入汇总）
            var hasCarb = d[t.getCarb] && d[t.getCarb].trim();
            var hasCl   = d[t.getCl] && d[t.getCl].trim();
            var hasRp   = t.getRp && d[t.getRp] && d[t.getRp].trim();
            var hasPh   = t.getPh && d[t.getPh] && d[t.getPh].trim();
            var hasRust = d[t.getRust] && d[t.getRust].trim();
            var hasAlk  = t.getAlkali && d[t.getAlkali] && d[t.getAlkali].trim();
            var hasDur  = hasCarb || hasCl || hasRp || hasPh || hasRust || hasAlk;
            if (!hasDur) continue;
            // 构件级耐久性评级
            var rating = rateCompDurability(hasCarb ? parseFloat(d[t.getCarb]) : null,
                hasCl ? parseFloat(d[t.getCl]) : null,
                hasRp ? parseFloat(d[t.getRp]) : null,
                hasRust ? d[t.getRust] : null,
                hasAlk ? d[t.getAlkali] : null);
            result.push({
                typeIcon: t.icon,
                label: item.label,
                carbD:    hasCarb ? d[t.getCarb] : null,
                chloride:  hasCl   ? d[t.getCl]   : null,
                rustPot:  hasRp   ? d[t.getRp]   : null,
                phValue:  hasPh   ? d[t.getPh]   : null,
                rust:     hasRust ? d[t.getRust] : null,
                alkali:   hasAlk  ? d[t.getAlkali] : null,
                rating: rating
            });
        }
    }
    return result;
}

// 构件级耐久性评级（A/B/C/D，对应优秀/良好/中等/差）
function rateCompDurability(carbD, chloride, rustPot, rustVisual, alkali) {
    var score = 0; // 0=优秀 1=良好 2=中等 3=差
    if (carbD !== null) {
        if (carbD > 25) score = Math.max(score, 2);
        if (carbD > 30) score = Math.max(score, 3);
    }
    if (chloride !== null) {
        if (chloride > 0.10) score = Math.max(score, 1);
        if (chloride > 0.30) score = Math.max(score, 2);
        if (chloride > 0.50) score = Math.max(score, 3);
    }
    if (rustPot !== null) {
        if (rustPot < -200) score = Math.max(score, 1);
        if (rustPot < -350) score = Math.max(score, 2);
        if (rustPot < -500) score = Math.max(score, 3);
    }
    if (rustVisual) {
        if (rustVisual === '轻微') score = Math.max(score, 1);
        if (rustVisual === '中等') score = Math.max(score, 2);
        if (rustVisual === '严重') score = Math.max(score, 3);
    }
    if (alkali) {
        if (alkali === '疑似') score = Math.max(score, 2);
        if (alkali === '明显') score = Math.max(score, 3);
    }
    var grades = ['A（优秀）', 'B（良好）', 'C（中等）', 'D（较差）'];
    return grades[Math.min(score, 3)];
}

function calcDur() {
    var cd = parseFloat(v('d_cd')) || 0;
    var cr = parseFloat(v('d_cr')) || 0;
    var pl = parseFloat(v('d_pl')) || 0;
    var cl = parseFloat(v('d_cl')) || 0;

    var tCarb = (cr > 0) ? Math.pow(pl / cr, 2).toFixed(1) : '—';
    var tUsed = (cr > 0 && cd > 0) ? Math.pow(cd / cr, 2).toFixed(1) : '—';
    var remain = (tCarb !== '—' && tUsed !== '—') ?
        Math.max(0, parseFloat(tCarb) - parseFloat(tUsed)).toFixed(1) : '—';

    var carbEl = document.getElementById('carbonCalc');
    if (carbEl) {
        var carbRisk = cd >= pl ? '🔴 碳化已超过保护层，钢筋面临锈蚀风险'
            : cd >= pl * 0.7 ? '⚠️ 碳化深度接近保护层厚度，需关注'
            : '✅ 碳化深度在安全范围内';
        carbEl.innerHTML =
            '<strong>📊 碳化寿命估算（t = (c/k)²，GB/T 50784-2013）</strong><br>' +
            '保护层 ' + pl + ' mm → 预测碳化寿命: <b>' + tCarb + '</b> 年<br>' +
            '当前碳化深度 ' + cd + ' mm 对应已历时约 <b>' + tUsed + '</b> 年<br>' +
            '预计剩余碳化安全期: <b>' + remain + '</b> 年<br>' +
            '<span style="font-size:.8rem;">' + carbRisk + '</span>';
    }

    var clLevel = cl < 0.10 ? '✅ 低风险 — 钢筋不易锈蚀' : cl < 0.30 ? '⚠️ 中等风险 — 建议定期观测' : '🔴 高风险 — 需采取防护措施（涂覆防腐涂层或阴极保护）';
    var chlorEl = document.getElementById('chlorCalc');
    if (chlorEl) chlorEl.innerHTML = '<strong>⚡ 氯离子评定（CECS 220:2007）</strong><br>含量 ' + cl + '% — ' + clLevel;
}

function saveDur() {
    S.dur = {
        carbonDepth:     parseFloat(v('d_cd')) || 0,
        carbonRate:      parseFloat(v('d_cr')) || 0,
        protectionLayer: parseFloat(v('d_pl')) || 0,
        chloride:        parseFloat(v('d_cl')) || 0,
        environment:     v('d_env'),
        freezeCycles:   parseFloat(v('d_fc')) || 0,
        frostGrade:      v('d_fg'),
        freezeDamage:   v('d_fd'),
        residualLife:   parseFloat(v('d_rl')) || 0,
        durabilityLevel: v('d_dl')
    };
    goStep(4);  // 跳转到抗震验算步骤
}

/* ====================================================
   检测方案生成函数（根据 GB50023-2009 规范）
==================================================== */
function genPlan() {
    var b = S.building;
    var year = parseInt(b.year) || 1990;
    var intensity = b.intensity || '7度';
    var structType = b.structType || '钢筋混凝土框架结构';
    var floors = parseInt(b.floors) || 5;
    var area = parseInt(b.area) || 1000;
    var siteClass = b.siteClass || 'Ⅱ类';
    var serviceLife = b.serviceLife || '50年 (C类)';
    
    // 建筑类别判定（按 GB 50023-2009）
    var buildClass = 'C类';
    if (year <= 1979) buildClass = 'A类';
    else if (year <= 1999) buildClass = 'B类';
    
    // 抗震鉴定方法选择（GB 50023-2009 第5章）
    var methodNote = '';
    if (buildClass === 'A类') {
        methodNote = 'A类建筑（1979年及以前）：后续使用年限30年，应采用本标准第5.1节规定的A类建筑抗震鉴定方法（简化方法）。\n' +
        '重点核查：抗震支撑、圈梁、构造柱等整体性连接构造，以及易引起局部倒塌的构件与主体结构的连接。';
    } else if (buildClass === 'B类') {
        methodNote = 'B类建筑（1980-1999年）：后续使用年限40年，应采用本标准第5.2节规定的B类建筑抗震鉴定方法（综合抗震能力法）。\n' +
        '应进行抗震措施核查和抗震承载力验算，可采用楼层综合抗震能力指数法。';
    } else {
        methodNote = 'C类建筑（2000年及以后）：后续使用年限50年，应采用本标准第5.3节规定的C类建筑抗震鉴定方法。\n' +
        '应按现行抗震设计规范进行抗震计算和抗震构造措施核查，重点复核构造柱、圈梁等抗震措施。';
    }

    // 内框架/底层框架专项说明（GB 50023-2009 第7章）
    var specialNote = '';
    if (structType.indexOf('内框架') >= 0) {
        specialNote = '\n\n【内框架砖房专项检测要求（GB 50023-2009 第7章）】\n' +
        '1. 钢筋混凝土部分检测：框架梁截面尺寸、配筋、混凝土强度；框架柱轴压比、箍筋配置；\n' +
        '2. 砖墙部分检测：砖强度、砂浆强度、墙体厚度、裂缝及破损情况；\n' +
        '3. 框架-砖墙协同工作检测：内框架梁与砖墙的连接构造；\n' +
        '4. 抗震构造措施：构造柱设置、圈梁设置、楼盖整体性；\n' +
        '5. 承载力验算：采用底层地震剪力乘以增大系数后的框架部分验算。';
    } else if (structType.indexOf('底层框架') >= 0) {
        specialNote = '\n\n【底层框架砖房专项检测要求（GB 50023-2009 第7章）】\n' +
        '1. 底层框架部分检测：框架梁截面尺寸、配筋、混凝土强度；框架柱轴压比、箍筋配置；\n' +
        '2. 托墙梁（转换梁）检测：截面尺寸、配筋、裂缝、挠度；\n' +
        '3. 上部砖混部分检测：砖强度、砂浆强度、墙体厚度；\n' +
        '4. 抗震构造措施：底部框架的抗震墙设置、框架梁柱箍筋加密区；\n' +
        '5. 承载力验算：底层框架部分承担全部地震剪力，上部砖混按墙体抗震验算。';
    }
    methodNote += specialNote;
    
    // 根据结构类型确定检测重点
    var structFocus = '';
    if (structType.indexOf('框架') >= 0) {
        structFocus = '框架结构检测重点：\n  - 框架柱的轴压比、箍筋加密区长度及箍筋间距\n  - 框架梁的纵筋配筋率、箍筋配箍率\n  - 梁柱节点核心区的箍筋配置及混凝土质量\n  - 填充墙与框架的连接构造';
    } else if (structType.indexOf('砌体') >= 0 || structType.indexOf('砖混') >= 0) {
        structFocus = '砌体结构检测重点：\n  - 墙体砂浆强度（采用回弹法或贯入法检测）\n  - 墙体砌筑质量（组砌方式、有无通缝）\n  - 圈梁、构造柱设置情况\n  - 纵横墙交接处连接可靠性\n  - 房屋整体性连接构造';
    } else if (structType.indexOf('剪力墙') >= 0 || structType.indexOf('框架-剪力墙') >= 0) {
        structFocus = '剪力墙/框架-剪力墙结构检测重点：\n  - 剪力墙墙体厚度、配筋分布\n  - 边缘构件的箍筋配置\n  - 连梁的配筋及截面尺寸\n  - 楼层位移刚度比';
    } else {
        structFocus = '其他结构检测重点：\n  - 结构整体布置及受力体系\n  - 主要承重构件的截面尺寸及配筋\n  - 结构整体变形和损伤情况';
    }
    
    // 抗震设防烈度对应鉴定要求
    var intensityReq = '';
    if (intensity.indexOf('6') >= 0) {
        intensityReq = '6度设防：可适当降低要求，但不得建于危险地段；\n  - 现有这类房屋应满足相应的抗震构造要求；\n  - 对于不符合抗震构造要求的房屋，应采取加固或其他相应措施。';
    } else if (intensity.indexOf('7') >= 0) {
        intensityReq = '7度设防：\n  - 第一阶段鉴定：抗震措施核查（承载力验算可采用简化方法）\n  - 第二阶段鉴定：重点部位承载力验算\n  - 重点检查：构造柱/圈梁设置、纵筋搭接锚固、箍筋加密';

    }
    
    // 根据高度确定是否需要高层鉴定
    var heightNote = floors > 8 ? 
        '注：该建筑为高层建筑（>' + floors + '层），应按照《高层建筑混凝土结构技术规程》JGJ 3的相关要求进行补充鉴定。' :
        '注：多层建筑，按多层建筑抗震鉴定方法执行。';
    
    // 抽样方案（根据结构类型和层数自动生成推荐值）
    var samplingRules = '';
    if (structType.indexOf('框架') >= 0) {
        samplingRules = '【框架结构抽样规则】\n' +
        '1. 混凝土强度检测：每层随机抽取 2~3 个构件（柱或梁），总抽检数量不少于 6 个构件；\n' +
        '2. 钢筋配置检测：每种受力钢筋类型各抽取 2 处，核查保护层厚度及配筋数量；\n' +
        '3. 构件尺寸复核：每层抽取 2 个代表性构件进行截面尺寸量测；\n' +
        '4. 填充墙连接：随机抽取 3~5 处检查填充墙与框架的连接构造。';
    } else if (structType.indexOf('砌体') >= 0 || structType.indexOf('砖混') >= 0) {
        samplingRules = '【砌体结构抽样规则】\n' +
        '1. 砌筑砂浆强度：每层均匀布置 3~5 个测区（每测区 5 个测点），总测区数不少于 5 个；\n' +
        '2. 砖强度检测：每层抽取 2~3 块砖进行抗压强度测试；\n' +
        '3. 墙体砌筑质量：每层抽取 2~3 片墙体检查组砌方式及有无通缝；\n' +
        '4. 圈梁、构造柱：逐层检查设置情况，重点抽查纵横墙交接处；\n' +
        '5. 纵横墙连接：每层抽查 2~3 处交接构造，检查咬槎质量；\n' +
        '6. 整体性构造：检查屋盖与墙体的连接、山墙与檩条的连接等。';
    } else if (structType.indexOf('剪力墙') >= 0 || structType.indexOf('框架-剪力墙') >= 0) {
        samplingRules = '【剪力墙/框架-剪力墙结构抽样规则】\n' +
        '1. 混凝土强度检测：每层抽取 2~3 个构件（墙肢或框架柱），总抽检数量不少于 6 个；\n' +
        '2. 钢筋配置检测：每个剪力墙边缘构件抽取 1~2 处核查竖向和水平钢筋；\n' +
        '3. 墙体厚度：每层抽取 2~3 处测量墙体厚度；\n' +
        '4. 连梁配筋：抽取 2~3 跨连梁核查截面尺寸及配筋情况。';
    } else {
        samplingRules = '【其他结构抽样规则】\n' +
        '1. 主要承重构件按每层 2~3 个抽取检测，总数不少于 6 个；\n' +
        '2. 结构整体布置检查：全数核查结构体系及传力路径；\n' +
        '3. 连接节点：每层抽取 2~3 个节点检查连接质量。';
    }
    
    // 倾斜和沉降测量点布置
    var deformationSampling = '【结构变形测量】\n' +
    '1. 整体倾斜观测：建筑物四角及中部特征点设置观测点，不少于 4 个测点；\n' +
    '2. 沉降观测：沿外墙每隔 10~15m 布设沉降观测点，每侧不少于 3 点；\n' +
    '3. 测量仪器：全站仪或经纬仪（倾斜）、水准仪（沉降）；\n' +
    '4. 测量精度：按二等水准测量要求执行。';

    var plan = `【${b.name}抗震检测鉴定方案】

一、工程概况
  建筑名称：${b.name}
  建造年份：${year}年（距今约${2026-year}年）
  结构类型：${structType}
  层数/面积：地上${floors}层/总建筑面积约${area}㎡
  设防烈度：${intensity}（场地类别：${siteClass}）
  建筑分类：${buildClass}类建筑（后续使用年限：${serviceLife}）

二、检测鉴定依据
  1. GB 55021-2021《既有建筑鉴定与加固通用规范》
  2. GB 50023-2009《建筑抗震鉴定标准》
  3. GB 50011-2010(2016版)《建筑抗震设计规范》
  4. GB/T 50344-2019《建筑结构检测技术标准》
  5. GB/T 50784-2013《结构混凝土耐久性评定标准》
  6. CECS 220:2007《混凝土结构耐久性评估标准》
  7. JGJ/T 234-2011《择压法检测砌筑砂浆强度技术规程》

三、${buildClass}类建筑抗震鉴定方法说明
${methodNote}

四、结构类型检测重点
${structFocus}

五、${intensity}设防抗震鉴定要求
${intensityReq}

六、主要检测项目
  1. 建筑与结构基本情况调查
     - 核实建筑层数、平面尺寸、总高度
     - 调查结构体系、构件尺寸、连接方式
     - 复核地基基础情况
  
  2. 材料强度检测
     - 混凝土强度：采用回弹法或钻芯法检测
     - 砌体强度：采用回弹法或贯入法检测砂浆强度
     - 钢筋：采用电磁法检测钢筋配置及保护层厚度
  
  3. 外观质量与损伤检查
     - 裂缝分布、宽度、长度及特征
     - 钢筋锈蚀、混凝土剥落情况
     - 渗漏、潮湿、冻融损伤
  
  4. 抗震构造措施核查
     - 圈梁、构造柱设置位置及间距
     - 梁柱配筋、箍筋加密情况
     - 楼梯间、女儿墙等易损部位构造
  
  5. 抗震承载力验算
     - 宜采用专业软件（盈建科YJK或PKPM-SATWE）建模分析
     - 简化手算法：采用承载力抗震调整系数法（βci法）
     - 性能化评价：薄弱层位移角、剪压比等指标

六-1、检测抽样方案
${samplingRules}

${deformationSampling}

七、检测仪器与设备
  - 回弹仪（混凝土强度检测）
  - 钢筋扫描仪（钢筋位置及保护层厚度）
  - 全站仪或经纬仪（垂直度及变形测量）
  - 裂缝观测仪（裂缝宽度测量）
  - 砂浆贯入仪（砂浆强度检测）

八、建议后续工作
  1. 根据检测结果，依据GB 50023-2009进行抗震能力综合评定
  2. 如需加固，应编制加固方案及施工图
  3. 建议设置长期监测点，定期观测结构变形

${heightNote}

编制：________________ 审核：________________ 日期：________`;

    return plan;
}

function regenPlan() {
    try {
        var textarea = document.getElementById('planEditor');
        if (!textarea) {
            alert('错误：找不到检测方案编辑器');
            return;
        }
        var newPlan = genPlan();
        if (newPlan) {
            textarea.value = newPlan;
            // 显示成功提示
            var btn = document.querySelector('button[onclick="regenPlan()"]');
            if (btn) {
                var originalText = btn.innerHTML;
                btn.innerHTML = '✅ 已重新生成';
                btn.style.background = '#10b981';
                btn.style.color = 'white';
                setTimeout(function() {
                    btn.innerHTML = originalText;
                    btn.style.background = '';
                    btn.style.color = '';
                }, 1500);
            }
        } else {
            alert('生成检测方案失败，请检查基本信息是否完整');
        }
    } catch (e) {
        console.error('重新生成失败:', e);
        alert('重新生成失败：' + e.message);
    }
}

// 将抽样配置应用到检测方案文本
function applySamplingToPlan() {
    var sm = S.sampling;
    var b = S.building;
    var floors = parseInt(b.floors) || 5;
    var structType = b.structType || '';
    
    // 获取最新输入值
    var concPerFloor = parseInt(document.getElementById('s_concPerFloor') ? document.getElementById('s_concPerFloor').value : 2) || 2;
    var concTotalMin = parseInt(document.getElementById('s_concTotalMin') ? document.getElementById('s_concTotalMin').value : 6) || 6;
    var mortarZones = parseInt(document.getElementById('s_mortarZones') ? document.getElementById('s_mortarZones').value : 3) || 3;
    var mortarFloors = parseInt(document.getElementById('s_mortarFloors') ? document.getElementById('s_mortarFloors').value : 5) || 5;
    var wallCount = parseInt(document.getElementById('s_wallCount') ? document.getElementById('s_wallCount').value : 2) || 2;
    var wallJoints = parseInt(document.getElementById('s_wallJoints') ? document.getElementById('s_wallJoints').value : 2) || 2;
    var steelCount = parseInt(document.getElementById('s_steelCount') ? document.getElementById('s_steelCount').value : 4) || 4;
    var tiltPoints = parseInt(document.getElementById('s_tiltPoints') ? document.getElementById('s_tiltPoints').value : 4) || 4;
    var settlePoints = parseInt(document.getElementById('s_settlePoints') ? document.getElementById('s_settlePoints').value : 3) || 3;
    var customNote = document.getElementById('s_customNote') ? document.getElementById('s_customNote').value : '';
    
    // 构建详细抽样规则
    var detailedSampling = '';
    
    if (structType.indexOf('框架') >= 0 || structType.indexOf('剪力墙') >= 0) {
        var concTotal = Math.max(concPerFloor * floors, concTotalMin);
        detailedSampling += '【混凝土构件抽样方案】\n' +
            '- 抽样方法：随机抽样，每层均匀分布\n' +
            '- 混凝土强度：共抽检 ' + concTotal + ' 个构件（每层约 ' + concPerFloor + ' 个）\n' +
            '- 检测方法：回弹法为主，钻芯法校核\n' +
            '- 构件类型：框架柱、框架梁、抗震墙等承重构件\n';
    }
    
    if (structType.indexOf('砌体') >= 0 || structType.indexOf('砖混') >= 0) {
        var totalMortarZones = mortarZones * mortarFloors;
        var totalWalls = wallCount * floors;
        detailedSampling += '【砌体结构抽样方案】\n' +
            '- 砂浆强度：共布置 ' + totalMortarZones + ' 个测区（每层 ' + mortarZones + ' 处 × ' + mortarFloors + ' 层）\n' +
            '- 检测方法：贯入法或回弹法，每个测区 5 个测点\n' +
            '- 墙体砌筑质量：共检查 ' + totalWalls + ' 片墙体（每层 ' + wallCount + ' 片）\n' +
            '- 纵横墙交接处：重点检查 ≥' + wallJoints + ' 处咬槎质量\n' +
            '- 抽样原则：优先选择门窗洞口附近、承重墙交接处等关键部位\n';
    }
    
    detailedSampling += '【钢筋配置抽样方案】\n' +
        '- 抽样数量：共检测 ' + steelCount + ' 处\n' +
        '- 检测内容：保护层厚度、钢筋数量/直径、箍筋间距\n' +
        '- 抽样原则：覆盖不同受力类型的构件\n';
    
    detailedSampling += '【结构变形测量方案】\n' +
        '- 整体倾斜：设置 ' + tiltPoints + ' 个观测点（建筑四角及中部）\n' +
        '- 沉降观测：沿外墙每侧布置 ' + settlePoints + ' 个点，全楼共约 ' + (settlePoints * 4) + ' 点\n' +
        '- 观测仪器：全站仪（倾斜）、水准仪（沉降）\n' +
        '- 测量精度：二等水准测量要求\n';
    
    if (customNote) {
        detailedSampling += '\n【补充说明】\n' + customNote + '\n';
    }
    
    // 更新到方案文本
    var textarea = document.getElementById('planEditor');
    if (textarea) {
        var currentText = textarea.value;
        
        // 替换或添加详细抽样规则
        var samplingSectionRegex = /六-1、检测抽样方案[\s\S]*?(?=七、检测仪器与设备|$)/;
        if (samplingSectionRegex.test(currentText)) {
            currentText = currentText.replace(samplingSectionRegex, '六-1、检测抽样方案（详细配置）\n' + detailedSampling + '\n');
        } else {
            // 如果没有找到该部分，在第六节后插入
            currentText = currentText.replace(/(五、抗震承载力验算[\s\S]*?)((?=六-1)|(?=七、检测仪器)|(?=七、建议后续工作))/, 
                '$1\n六-1、检测抽样方案（详细配置）\n' + detailedSampling + '\n$2');
        }
        
        textarea.value = currentText;
        
        // 显示成功提示
        var btn = document.querySelector('button[onclick="applySamplingToPlan()"]');
        if (btn) {
            var originalText = btn.innerHTML;
            btn.innerHTML = '✅ 已应用';
            btn.style.background = '#10b981';
            btn.style.color = 'white';
            setTimeout(function() {
                btn.innerHTML = originalText;
                btn.style.background = '';
                btn.style.color = '';
            }, 1500);
        }
    }
    
    // 保存到状态
    S.sampling = {
        mode: 'detailed',
        concCount: concPerFloor,
        concTotalMin: concTotalMin,
        mortarZones: mortarZones,
        mortarFloors: mortarFloors,
        wallCount: wallCount,
        wallJoints: wallJoints,
        steelCount: steelCount,
        tiltPoints: tiltPoints,
        settlePoints: settlePoints,
        customNote: customNote,
        checkProtLayer: sm.checkProtLayer,
        checkRebarCount: sm.checkRebarCount,
        checkRebarDia: sm.checkRebarDia,
        checkStirrup: sm.checkStirrup
    };
}

async function runPlanAI() {

        var res = document.getElementById('planAiResult');
        res.style.display = 'block';
        res.innerHTML = '<div class="panel warning"><strong>⚠️ AI 尚未配置</strong><br>请先前往「①基本信息」页面配置 AI API Key，然后再使用 AI 分析功能。</div>';
        return;
    }
    
    var btn = document.getElementById('planAiBtn');
    var spin = document.getElementById('planAiSpin');
    var res = document.getElementById('planAiResult');
    btn.disabled = true;
    spin.classList.remove('hidden');
    res.style.display = 'block';
    res.innerHTML = '<p style="color:#666">⏳ AI 分析中…</p>';

    try {
        var b = S.building;
        var planText = v('planEditor') || genPlan();
        var modelId = S.aiModel || 'gpt-4o';
        var sys = '你是资深建筑抗震鉴定专家，熟悉 GB 55021-2021、GB 50023-2009、JGJ/T 234-2011 等规范。请根据检测方案进行专业分析。';
        var userPrompt =
            '请分析以下既有建筑抗震鉴定检测方案的完整性和专业性：\n\n' +
            '【基本信息】\n' +
            '建筑名称: ' + b.name + '\n' +
            '结构类型: ' + b.structType + '\n' +
            '建造年份: ' + b.year + '年\n' +
            '层数/面积: ' + b.floors + '层/' + b.area + '㎡\n' +
            '抗震设防烈度: ' + b.intensity + '\n' +
            '场地类别: ' + b.siteClass + '\n' +
            '后续使用年限: ' + b.serviceLife + '\n\n' +
            '【检测方案内容】\n' + planText + '\n\n' +
            '请从以下维度进行分析：\n' +
            '1. 方案是否完整覆盖了必要的检测内容？\n' +
            '2. 该结构类型（' + b.structType + '）的检测重点是否准确？\n' +
            '3. 推荐哪些适合本工程的软件进行抗震验算？\n' +
            '4. 有哪些需要特别注意的检测要点？\n' +
            '5. 对方案的改进建议（若有）。';

        var resp = await fetch(S.apiUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + S.apiKey },
            body: JSON.stringify({
                model: modelId,
                messages: [
                    { role: 'system', content: sys },
                    { role: 'user',   content: userPrompt }
                ],
                temperature: 0.3, max_tokens: 2000
            })
        });
        if (!resp.ok) throw new Error('API 返回 HTTP ' + resp.status);
        var data = await resp.json();
        var text = (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) || '无返回内容';
        S.planData = S.planData || {};
        S.planData.aiAnalysis = text;
        res.innerHTML = '<div class="panel success"><strong>✅ AI 分析完成</strong>' +
            '<div style="white-space:pre-wrap;font-family:\'Courier New\',monospace;max-height:350px;overflow-y:auto;margin-top:10px;font-size:.82rem;">' +
            esc(text) + '</div></div>';
    } catch(e) {
        res.innerHTML = '<div class="panel danger"><strong>❌ 分析失败：</strong>' + esc(e.message) + '</div>';
    } finally {
        btn.disabled = false;
        spin.classList.add('hidden');
    }
}

// RC框架验算行计算函数
function calcRCRow(idx) {
    var viVal = parseFloat(document.getElementById('rv_' + idx) && document.getElementById('rv_' + idx).value) || 0;
    var siVal = parseFloat(document.getElementById('rs_' + idx) && document.getElementById('rs_' + idx).value) || 0;
    var ratioEl = document.getElementById('rratio_' + idx);
    var judgeEl = document.getElementById('rjudge_' + idx);
    
    // 保存到rcFrame数据
    var rcFrame = S.calc.rcFrame = S.calc.rcFrame || {};
    rcFrame.floorV = rcFrame.floorV || [];
    rcFrame.floorS = rcFrame.floorS || [];
    rcFrame.floorRatio = rcFrame.floorRatio || [];
    rcFrame.floorDisp = rcFrame.floorDisp || [];
    rcFrame.floorV[idx] = viVal;
    rcFrame.floorS[idx] = siVal;
    
    if (viVal > 0 && siVal > 0) {
        var r = (viVal / siVal).toFixed(3);
        rcFrame.floorRatio[idx] = r;
        if (ratioEl) ratioEl.innerHTML = '<b>' + r + '</b>';
        if (judgeEl) {
            judgeEl.innerHTML = r <= 1.0
                ? '<span style="color:#065f46;font-weight:700;">✅ 满足</span>'
                : '<span style="color:#991b1b;font-weight:700;">❌ 不满足</span>';
        }
    } else {
        rcFrame.floorRatio[idx] = '';
        if (ratioEl) ratioEl.innerHTML = '—';
        if (judgeEl) judgeEl.innerHTML = '—';
    }
}

// 更新RC框架变形验算结果
function updateRCDriftResult() {
    var rcFrame = S.calc.rcFrame = S.calc.rcFrame || {};
    var maxDrift = document.getElementById('rc_maxDrift') ? document.getElementById('rc_maxDrift').value : rcFrame.maxDrift || '';
    var driftLimit = document.getElementById('rc_driftLimit') ? document.getElementById('rc_driftLimit').value : rcFrame.driftLimit || '';
    var driftResult = document.getElementById('rcDriftResult');
    
    if (maxDrift && driftLimit && driftResult) {
        var maxDenom = parseFloat(maxDrift.split('/')[1]) || 0;
        var limitDenom = parseFloat(driftLimit.split('/')[1]) || 0;
        var isPass = maxDenom >= limitDenom;
        driftResult.innerHTML = '<strong>变形验算结论：</strong>最大层间位移角 ' + maxDrift + ' ' + 
            (isPass ? '≥' : '<') + ' 限值 ' + driftLimit + '，' + 
            (isPass ? '✅ <span style="color:#065f46;">满足变形要求</span>' : '❌ <span style="color:#991b1b;">不满足变形要求，需加固处理</span>');
    }
}

function loadSampleSoftData() {
    var b = S.building;
    var floors = b.floors || 5;
    var sd = S.calc.softData = S.calc.softData || {};
    sd.softName = 'PKPM-SATWE';
    sd.softVer  = '5.1';
    sd.structType = b.structType;
    sd.earthquakeGroup = '第一组';
    sd.Tg      = b.siteClass === 'Ⅱ类' ? '0.40' : '0.35';
    sd.damping = '0.05';
    sd.period  = '1.10';
    sd.alphaMax = b.intensity.indexOf('7') >= 0 ? '0.08' : '0.16';
    sd.floorV  = sd.floorV  || [];
    sd.floorS  = sd.floorS  || [];
    sd.shearRatio = sd.shearRatio || [];
    for (var i = 0; i < floors; i++) {
        var ratio = (0.65 + Math.random() * 0.25).toFixed(3);
        sd.floorV[i] = Math.round(800 - i * 80);
        sd.floorS[i] = Math.round(1100 - i * 100);
        sd.shearRatio[i] = ratio;
    }
    sd.weakFloor = '第1层（底层）';
    sd.maxDisp   = '1/550';
    sd.dispLimit = '1/300';
    sd.conclusion = '各楼层剪压比均满足 GB 50011-2010 规定；结构最大层间位移角 1/550 < 1/300，满足规范要求。';
    renderCalc();
}

function clearSoftData() {
    S.calc.softData = {};
    S.calc.perfEval = {};
    renderCalc();
}

function renderCalc() {
    var c = S.calc;
    var b = S.building;
    var floors = b.floors || 5;

    // 确保层数据初始化
    while (c.floorAreas.length < floors) { c.floorAreas.push(b.area / floors); }
    while (c.wallAreas.length < floors)  { c.wallAreas.push(Math.round(b.area * 0.08)); }
    c.floorAreas.length = floors;
    c.wallAreas.length  = floors;

    var floorRows = '';
    for (var i = 0; i < floors; i++) {
        var fa = c.floorAreas[i] || Math.round(b.area / floors);
        var wa = c.wallAreas[i]  || Math.round(fa * 0.08);
        floorRows += '<tr>' +
            '<td style="padding:8px 12px;font-weight:700;">第 ' + (i+1) + ' 层</td>' +
            '<td style="padding:8px 12px;"><input type="number" style="width:100px;" id="cfa_' + i + '" value="' + fa.toFixed(0) + '" oninput="runCalc()"> m²</td>' +

function runCalc() {
    var c = S.calc;
    var b = S.building;
    var floors = b.floors || 5;

    for (var i = 0; i < floors; i++) {
        var faEl = document.getElementById('cfa_' + i);
        var waEl = document.getElementById('cwa_' + i);
        if (!faEl || !waEl) continue;
        c.floorAreas[i] = parseFloat(faEl.value) || 0;
        c.wallAreas[i]  = parseFloat(waEl.value)  || 0;
    }
    c.wallThickAvg = parseFloat(document.getElementById('c_wt').value) || 240;

    // 计算每层 βci（简化公式演示：βci = ψ₁ψ₂ζe · βi）
    // 其中 βi ≈ As / (A × η)，η为楼层位置系数
    var mg   = document.getElementById('c_mg')   ? document.getElementById('c_mg').value   : c.masonryGrade;
    var mort = document.getElementById('c_mort') ? document.getElementById('c_mort').value : c.mortarGrade;
    var cg   = document.getElementById('c_cg')   ? document.getElementById('c_cg').value   : c.concreteGrade;
    c.masonryGrade = mg;
    c.mortarGrade  = mort;
    c.concreteGrade = cg;
    c.wallThickAvg = parseFloat(document.getElementById('c_wt').value) || 240;

    // 从界面获取用户设置的ψ1/ψ2系数（GB 50023-2009 附录A）
    var psi1 = parseFloat(document.getElementById('c_psi1') ? document.getElementById('c_psi1').value : 1.0) || 1.0;
    var psi2 = parseFloat(document.getElementById('c_psi2') ? document.getElementById('c_psi2').value : 1.0) || 1.0;
    c.psi1 = psi1;
    c.psi2 = psi2;
    c.psi1Type = document.getElementById('c_psi1_type') ? document.getElementById('c_psi1_type').value : c.psi1Type || '';
    c.psi2Type = document.getElementById('c_psi2_type') ? document.getElementById('c_psi2_type').value : c.psi2Type || '';

    var classType = b.serviceLife.indexOf('A') >= 0 ? 'A' : b.serviceLife.indexOf('B') >= 0 ? 'B' : 'C';

    var allBeta = [];
    var minBeta = Infinity;
    var weakFloor = -1;
    var allPassed = true;
    var zeta_e = 1.0; // 砖墙强度指数（预初始化，循环内会被覆盖）

    for (var j = 0; j < floors; j++) {
        var fa = c.floorAreas[j] || 0;
        var wa = c.wallAreas[j]  || 0;
        if (fa <= 0 || wa <= 0) {
            allBeta.push(null);
            continue;
        }
        // 简化计算：墙体面积比 = As / A
        var wallRatio = wa / fa;
        // η：楼层位置系数（底层最大，顶层最小）
        var eta = 1.0 + 0.1 * (floors - j - 1);
        // ζe：砖墙强度指数（按 GB 50023-2009 附录 A 表 A.0.1 简化查表）
        var zeta_e = 1.0;
        // MU5 系列
        if (mg === 'MU5'   && mort === 'M1')   zeta_e = 0.46;
        else if (mg === 'MU5'   && mort === 'M2.5') zeta_e = 0.58;
        else if (mg === 'MU5'   && mort === 'M5')   zeta_e = 0.72;
        // MU7.5 系列
        else if (mg === 'MU7.5' && mort === 'M1')   zeta_e = 0.55;
        else if (mg === 'MU7.5' && mort === 'M2.5') zeta_e = 0.72;
        else if (mg === 'MU7.5' && mort === 'M5')   zeta_e = 0.88;
        else if (mg === 'MU7.5' && mort === 'M7.5') zeta_e = 1.00;
        // MU10 系列
        else if (mg === 'MU10'  && mort === 'M1')   zeta_e = 0.63;
        else if (mg === 'MU10'  && mort === 'M2.5') zeta_e = 0.82;
        else if (mg === 'MU10'  && mort === 'M5')   zeta_e = 1.00;
        else if (mg === 'MU10'  && mort === 'M7.5') zeta_e = 1.16;
        else if (mg === 'MU10'  && mort === 'M10')  zeta_e = 1.28;
        // MU15 系列
        else if (mg === 'MU15'  && mort === 'M2.5') zeta_e = 0.96;
        else if (mg === 'MU15'  && mort === 'M5')   zeta_e = 1.17;
        else if (mg === 'MU15'  && mort === 'M7.5') zeta_e = 1.35;
        else if (mg === 'MU15'  && mort === 'M10')  zeta_e = 1.50;
        // 墙厚修正
        var thickMod = c.wallThickAvg / 240;
        // βi ≈ 砖墙抗剪强度比（简化）
        var beta_i = Math.min(wallRatio * zeta_e * thickMod * 4.5, 2.5);
        var beta_ci = psi1 * psi2 * zeta_e * beta_i;
        allBeta.push(beta_ci);

        if (beta_ci < minBeta) { minBeta = beta_ci; weakFloor = j; }
        if (beta_ci < 1.0) allPassed = false;

        // 更新表格
        var betaEl = document.getElementById('cbeta_' + j);
        var resEl  = document.getElementById('cres_' + j);
        if (betaEl) betaEl.innerHTML = '<b>' + beta_ci.toFixed(2) + '</b>';
        if (resEl) {
            if (beta_ci >= 1.0) {
                resEl.innerHTML = '<span style="color:#065f46;font-weight:700;">✅ 满足</span>';
            } else if (beta_ci >= 0.8) {
                resEl.innerHTML = '<span style="color:#713f12;font-weight:700;">⚠️ 薄弱</span>';
            } else {
                resEl.innerHTML = '<span style="color:#991b1b;font-weight:700;">❌ 不满足</span>';
            }
        }
    }

    c.betaCI_list = allBeta;
    c.calcPassed = allPassed;

    // 生成结果框
    var resultBox = document.getElementById('calcResultBox');
    var headerClass = allPassed ? 'pass' : 'fail';
    var headerText  = allPassed ? '✅ 抗震验算通过（各层 βci 均 ≥ 1.0）' : '❌ 抗震验算不满足要求（部分层 βci < 1.0）';
    var headerIcon  = allPassed ? '📊' : '⚠️';

    var formulaLines = [];
    formulaLines.push('<span class="f-label">// 参数说明</span>');
    formulaLines.push('<span class="f-label">βci</span> = <span class="f-val">综合抗震能力指数</span>');
    formulaLines.push('<span class="f-label">ψ₁</span>  = <span class="f-val">' + psi1.toFixed(1) + '</span>（体系影响系数，依据结构体系查表）');
    formulaLines.push('<span class="f-label">ψ₂</span>  = <span class="f-val">' + psi2.toFixed(1) + '</span>（局部影响系数，依据局部尺寸缺陷查表）');
    formulaLines.push('<span class="f-label">ζe</span>  = <span class="f-val">' + zeta_e.toFixed(2) + '</span>（砖墙强度指数，砖' + mg + '+砂浆' + mort + '）');
    formulaLines.push('<span class="f-label">η</span>   = <span class="f-val">楼层位置系数</span>');
    formulaLines.push('');
    formulaLines.push('<span class="f-label">// 各层验算结果</span>');
    for (var k = 0; k < floors; k++) {
        var bk = allBeta[k];
        if (bk === null) continue;
        var bkStr = bk.toFixed(3);
        var bkTag = bk >= 1.0 ? '<span class="f-val" style="color:#86efac;">' + bkStr + ' ≥ 1.0 ✅</span>' :
                             bk >= 0.8 ? '<span style="color:#fde047;">' + bkStr + ' ⚠️ 薄弱</span>' :
                             '<span class="f-warn">' + bkStr + ' ❌ 不满足</span>';
        formulaLines.push('<span class="f-label">第' + (k+1) + '层:</span>  βci = ' + bkStr + '  ' + bkTag);
    }
    formulaLines.push('');
    formulaLines.push('<span class="f-label">// 规范依据</span>');
    formulaLines.push('<span class="f-unit">GB 50023-2009 第 5.2 节 · 综合抗震能力指数法</span>');
    formulaLines.push('<span class="f-unit">A类建筑：βci ≥ 1.0 满足鉴定要求</span>');
    formulaLines.push('<span class="f-unit">B/C类建筑：βci ≥ 1.0 且满足构造措施要求</span>');

    var weakInfo = '';
    if (weakFloor >= 0 && minBeta < 1.0) {
        weakInfo = '<div class="panel warning" style="margin-top:10px;"><strong>🔍 薄弱层分析：</strong>' +
            '第 <b>' + (weakFloor+1) + ' 层</b> βci=' + minBeta.toFixed(2) + ' 为全楼最低，' +
            '主要原因为该层承重墙体面积偏小/材料强度偏低，建议重点核查并采取加固措施。</div>';
    }

    if (resultBox) {
        resultBox.innerHTML =
        '<div class="calc-result-box">' +
          '<div class="calc-result-header ' + headerClass + '">' +
            headerIcon + ' ' + headerText + '　<span style="font-size:.8rem;font-weight:400;">（' + classType + '类建筑，βci合格线=1.0）</span>' +
          '</div>' +
          '<div class="calc-result-body">' +
            '<div class="formula-block">' + formulaLines.join('\n') + '</div>' +
            weakInfo +
          '</div>' +
        '</div>';
    }
}

function saveCalc() {
    var c = S.calc;
    var b = S.building;
    c.weakDesc   = document.getElementById('c_weak') ? document.getElementById('c_weak').value : '';
    c.conclusion = document.getElementById('c_conc')  ? document.getElementById('c_conc').value : '';
    // 保存ψ1/ψ2系数设置（GB 50023-2009 附录A）
    c.psi1 = parseFloat(document.getElementById('c_psi1') ? document.getElementById('c_psi1').value : 1.0) || 1.0;
    c.psi2 = parseFloat(document.getElementById('c_psi2') ? document.getElementById('c_psi2').value : 1.0) || 1.0;
    c.psi1Type = document.getElementById('c_psi1_type') ? document.getElementById('c_psi1_type').value : '';
    c.psi2Type = document.getElementById('c_psi2_type') ? document.getElementById('c_psi2_type').value : '';
    // calcPassed 已在 runCalc() 中计算完成，无需重复赋值

    // 保存软件计算数据
    var sd = S.calc.softData = S.calc.softData || {};
    sd.softName = v('sd_soft');
    sd.softVer  = v('sd_ver');
    sd.structType = v('sd_struct');
    sd.earthquakeGroup = v('sd_group');
    sd.Tg = v('sd_tg');
    sd.damping = v('sd_damp');
    sd.period  = v('sd_t1');
    sd.alphaMax = v('sd_amax');
    sd.weakFloor = v('sd_weakFloor');
    sd.maxDisp   = v('sd_disp');
    sd.dispLimit = v('sd_dispLimit');
    sd.conclusion = v('sd_conclusion');
    // 楼层数据
    var floors = b.floors || 5;
    sd.floorV = sd.floorV || [];
    sd.floorS = sd.floorS || [];
    sd.shearRatio = sd.shearRatio || [];
    for (var fi = 0; fi < floors; fi++) {
        sd.floorV[fi] = parseFloat(document.getElementById('sv_' + fi) && document.getElementById('sv_' + fi).value) || 0;
        sd.floorS[fi] = parseFloat(document.getElementById('ss_' + fi) && document.getElementById('ss_' + fi).value) || 0;
        sd.shearRatio[fi] = sd.floorV[fi] > 0 && sd.floorS[fi] > 0
            ? (sd.floorV[fi] / sd.floorS[fi]).toFixed(3) : '';
    }

    // 保存性能化评价数据
    var perf = S.calc.perfEval = S.calc.perfEval || {};
    perf.level = v('pp_level');
    perf.target = v('pp_target');
    perf.PGV = v('pp_pgv');
    perf.PGD = v('pp_pgd');
    perf.thetaLimit = v('pp_thetaLim');
    perf.state1 = v('pp_s1');
    perf.state2 = v('pp_s2');
    perf.state3 = v('pp_s3');
    perf.state4 = v('pp_s4');
    perf.achieved = v('pp_achieve');
    perf.pass = v('pp_pass');
    perf.conclusion = v('pp_conclusion');

    // 保存RC框架验算数据（C类建筑）
    var rcFrame = S.calc.rcFrame = S.calc.rcFrame || {};
    rcFrame.structType = v('rc_struct');
    rcFrame.intensity = v('rc_inten');
    rcFrame.group = v('rc_group');
    rcFrame.siteClass = v('rc_site');
    rcFrame.damping = v('rc_damp');
    rcFrame.Tg = v('rc_tg');
    rcFrame.alphaMax = v('rc_amax');
    rcFrame.period = v('rc_t1');
    rcFrame.gravity = v('rc_gravity');
    rcFrame.alpha1 = v('rc_alpha1');
    rcFrame.baseShear = v('rc_baseShear');
    rcFrame.driftType = v('rc_drift_type');
    rcFrame.driftLimit = v('rc_driftLimit');
    rcFrame.maxDrift = v('rc_maxDrift');
    rcFrame.colNCR = v('rc_colNCR');
    rcFrame.beamSCR = v('rc_beamSCR');
    rcFrame.jointOK = v('rc_jointOK');
    rcFrame.conclusion = v('rc_conclusion');
    // 楼层数据
    var rcFloors = b.floors || 5;
    rcFrame.floorV = rcFrame.floorV || [];
    rcFrame.floorS = rcFrame.floorS || [];
    rcFrame.floorRatio = rcFrame.floorRatio || [];
    rcFrame.floorDisp = rcFrame.floorDisp || [];
    for (var rfi = 0; rfi < rcFloors; rfi++) {
        rcFrame.floorV[rfi] = parseFloat(document.getElementById('rv_' + rfi) && document.getElementById('rv_' + rfi).value) || 0;
        rcFrame.floorS[rfi] = parseFloat(document.getElementById('rs_' + rfi) && document.getElementById('rs_' + rfi).value) || 0;
        rcFrame.floorDisp[rfi] = document.getElementById('rdisp_' + rfi) ? document.getElementById('rdisp_' + rfi).value : '';
    }

    // 保存尺寸偏差检测数据（GB/T 50344-2019 第3.4节）
    c.dimAxisOffset = v('dim_axisOffset');
    c.dimAxisLimit = v('dim_axisLimit');
    c.dimAxisResult = v('dim_axisResult');
    c.dimFloorHeight = v('dim_floorHeight');
    c.dimFloorHeightLimit = v('dim_floorHeightLimit');
    c.dimFloorHeightResult = v('dim_floorHeightResult');
    c.dimSection = v('dim_section');
    c.dimSectionLimit = v('dim_sectionLimit');
    c.dimSectionResult = v('dim_sectionResult');
    c.dimOverall = v('dim_overall');

    goStep(5);  // 跳转到报告大纲步骤
}

function countFilledComps() {
    var total = 0;
    for (var k in S.compLists) {
        var list = S.compLists[k];
        for (var i = 0; i < list.length; i++) {
            if (isItemFilled(list[i])) total++;
        }
    }
    return total;
}

function hasMaterialGrade() {
    for (var k in S.compLists) {
        var list = S.compLists[k];
        for (var i = 0; i < list.length; i++) {
            var item = list[i];
            var d = item.data || {};
            if (d.bw_mortar || d.bw_brick || d.cc_grade || d.cb_grade || d.cs_grade) return true;
        }
    }
    return false;
}
