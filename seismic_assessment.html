async function runAI() {
    // 检查 AI 是否已配置
    if (!S.apiKey || S.apiKey.trim() === '') {
        var res = document.getElementById('aiResult');
        res.style.display = 'block';
        res.innerHTML = '<div class="panel warning"><strong>⚠️ AI 尚未配置</strong><br>请先前往「①基本信息」页面配置 AI API Key，然后再使用 AI 分析功能。</div>';
        return;
    }
    
    var mode = v('ai_mode');
    var btn  = document.getElementById('aiBtn');
    var spin = document.getElementById('aiSpin');
    var res  = document.getElementById('aiResult');
    var next = document.getElementById('aiNext');
    btn.disabled = true;
    spin.classList.remove('hidden');
    res.style.display = 'block';
    res.innerHTML = '<p style="color:#666">⏳ AI 分析中，请稍候…</p>';
    try {
        var text = (mode === 'demo') ? genDemo() : await callAPI();
        S.aiAnalysis = text;
        res.innerHTML = '<div class="panel success"><strong>✅ AI 分析完成</strong>' +
            '<div style="white-space:pre-wrap;font-family:\'Courier New\',monospace;max-height:400px;overflow-y:auto;margin-top:10px;">' +
            esc(text) + '</div></div>';
        next.classList.remove('hidden');
    } catch(e) {
        res.innerHTML = '<div class="panel danger"><strong>❌ 分析失败：</strong>' + esc(e.message) +
            '<br><small>可切换至演示模式先查看效果</small></div>';
    } finally {
        btn.disabled = false;
        spin.classList.add('hidden');
    }
}

function genDemo() {
    var b = S.building, d = S.dur, c = S.calc;
    var mName = '演示AI';
    for (var i = 0; i < AI_MODELS.length; i++) {
        if (AI_MODELS[i].id === S.aiModel) { mName = AI_MODELS[i].name; break; }
    }
    var lines = [];
    lines.push('【' + mName + ' — 既有房屋抗震鉴定综合分析（演示模式）】');
    lines.push('生成时间: ' + new Date().toLocaleString('zh-CN'));
    lines.push('');
    lines.push('═══ 第三章：工程概况 ═══');
    lines.push(b.name + ' | ' + b.year + '年建造 | ' + b.structType);
    lines.push(b.location + ' | ' + b.floors + '层/' + b.area + '㎡ | 设防' + b.intensity + ' | ' + b.serviceLife);
    lines.push('');
    lines.push('═══ 第七章：构件检测结果汇总 ═══');
    for (var k in COMPS) {
        var list = S.compLists[k];
        if (!list || !list.length) continue;
        lines.push('【' + COMPS[k].name + '】共 ' + list.length + ' ' + COMPS[k].unit);
        var filled = list.filter(isItemFilled);
        lines.push('  已录入：' + filled.length + '/' + list.length);
        for (var j = 0; j < Math.min(filled.length, 3); j++) {
            var item = filled[j];
            var fields = COMP_FIELDS[k];
            var summaryParts = [];
            for (var fi = 0; fi < Math.min(fields.length, 5); fi++) {
                var f = fields[fi];
                if (item.data[f.id]) summaryParts.push(f.label + ': ' + item.data[f.id]);
            }
            lines.push('  ' + item.label + ' — ' + summaryParts.join('，'));
        }
        if (filled.length > 3) lines.push('  …（另 ' + (filled.length - 3) + ' 个略）');
        lines.push('');
    }
    lines.push('═══ 第九章：抗震验算分析 ═══');
    if (c.betaCI_list && c.betaCI_list.length > 0) {
        for (var fi2 = 0; fi2 < c.betaCI_list.length; fi2++) {
            var bk = c.betaCI_list[fi2];
            if (bk === null) continue;
            lines.push('  第' + (fi2+1) + '层：βci = ' + bk.toFixed(3) + '  ' + (bk >= 1.0 ? '✅ 满足' : bk >= 0.8 ? '⚠️ 薄弱' : '❌ 不满足'));
        }
        var validBetas = c.betaCI_list.filter(function(v){ return v !== null; });
        if (validBetas.length > 0) {
            var minBeta = Math.min.apply(null, validBetas);
            var weakIdx = c.betaCI_list.indexOf(minBeta);
            if (weakIdx >= 0) lines.push('  薄弱层：第' + (weakIdx + 1) + '层（βci=' + minBeta.toFixed(3) + '）');
        }
        lines.push('  验算结论：' + (c.calcPassed ? '✅ 各层均满足 βci≥1.0' : '❌ 部分层不满足，需加固处理后重新鉴定'));
    } else {
        lines.push('  （尚未完成抗震验算，请返回第⑤步填写）');
    }
    lines.push('');
    lines.push('═══ 第十一章：耐久性评估 ═══');
    // 构件级耐久性汇总
    var compDur = gatherCompDurability();
    if (compDur.length > 0) {
        lines.push('【构件级耐久性检测汇总（共' + compDur.length + '个构件）】');
        for (var ci = 0; ci < compDur.length; ci++) {
            var cr = compDur[ci];
            var parts = [cr.typeIcon + ' ' + cr.label];
            if (cr.carbD) parts.push('碳化' + cr.carbD + 'mm');
            if (cr.chloride) parts.push('Cl⁻' + cr.chloride + '%');
            if (cr.rustPot) parts.push('锈蚀电位' + cr.rustPot + 'mV');
            if (cr.phValue) parts.push('pH' + cr.phValue);
            parts.push('评级:' + cr.rating);
            lines.push('  ' + parts.join(' | '));
        }
    }
    lines.push('【全局综合值】');
    lines.push('碳化深度: ' + d.carbonDepth + 'mm | 保护层: ' + d.protectionLayer + 'mm');
    lines.push('碳化速率: ' + d.carbonRate + ' mm/√年');
    lines.push('氯离子: ' + d.chloride + '% — ' + (d.chloride < 0.10 ? '✅ 低风险' : d.chloride < 0.30 ? '⚠️ 中等风险' : '🔴 高风险'));
    lines.push('冻融: ' + d.freezeCycles + '次/年 | 损伤: ' + d.freezeDamage);
    lines.push('推定剩余使用年限: ' + d.residualLife + '年 — ' + d.durabilityLevel);
    lines.push('');
    lines.push('═══ 第十二章：综合评定 ═══');
    lines.push('依据 GB 50023-2009 综合抗震能力指数法，对该建筑进行综合抗震能力评定：');
    lines.push('• 结构体系总体合理，存在以下薄弱环节：');
    lines.push('  ① 部分层 βci 低于 1.0，需重点加固（详见第九章）');
    lines.push('  ② 裂缝超限构件（宽度>0.3mm）需注浆封闭+碳纤维布加固');
    lines.push('  ③ 混凝土柱/梁保护层偏薄，加速碳化风险');
    lines.push('  ④ 填充墙与框架柱连接有缝隙，需补灌砂浆/增设拉结筋');
    lines.push('  ⑤ 地基沉降需持续监测，差异沉降超限立即处理');
    lines.push('');
    lines.push('═══ 第十三章：加固建议（分级） ═══');
    lines.push('【立即处理（1个月内）】');
    lines.push('  · βci<0.8 的楼层：粘贴碳纤维布/外包钢加固砖墙');
    lines.push('  · 宽度>0.5mm裂缝：注浆封闭+碳纤维布贴补');
    lines.push('  · 女儿墙锚固复查，不满足要求者拆除重建');
    lines.push('【中期加固（6个月内）】');
    lines.push('  · 补设/补强构造柱，增配箍筋至 GB 50023 附录要求');
    lines.push('  · 圈梁薄弱段型钢夹板加固');
    lines.push('  · 填充墙拉结筋全面补全');
    lines.push('【定期监测】');
    lines.push('  · 每季度裂缝观测；每年沉降测量；每5年完整耐久性复查');
    lines.push('');
    lines.push('规范依据: GB 55021-2021 | GB 50023-2009 | CECS 293 | CECS 220 | GB/T 50784 | GB/T 50344');
    lines.push('');
    lines.push('⚠️ 本分析由AI辅助生成，最终鉴定须由注册结构工程师现场复核，并由有资质检测机构出具正式报告。');
    return lines.join('\n');
}

async function callAPI() {
    if (!S.apiKey) throw new Error('请输入有效的 API Key');
    if (!S.apiUrl) throw new Error('请输入 API 地址');
    var prompt = buildPrompt();
    var sys = '你是一位资深建筑抗震鉴定专家，严格遵循中国标准GB 55021-2021、GB 50023-2009、CECS 293、CECS 220、GB/T 50784、GB/T 50344。' +
        '请根据所提供的详细构件检测数据和耐久性数据，进行专业综合抗震鉴定分析，给出：' +
        '①构件级别的主要问题分析（按构件类型逐类）②综合抗震能力评估③主要安全隐患排序④分级加固建议。' +
        '在输出末尾必须注明：本分析由AI生成，最终结论需由注册结构工程师复核。';

    var modelId = '';
    for (var i = 0; i < AI_MODELS.length; i++) {
        if (AI_MODELS[i].id === S.aiModel) { modelId = AI_MODELS[i].model; break; }
    }
    if (!modelId) modelId = S.aiModel;

    var resp = await fetch(S.apiUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + S.apiKey },
        body: JSON.stringify({
            model: modelId,
            messages: [
                { role: 'system', content: sys },
                { role: 'user',   content: prompt }
            ],
            temperature: 0.3,
            max_tokens: 3000
        })
    });
    if (!resp.ok) throw new Error('API 返回 HTTP ' + resp.status);
    var data = await resp.json();
    return (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) || '无返回内容';
}

function buildPrompt() {
    var b = S.building, d = S.dur, c = S.calc;
    var lines = ['请对以下既有房屋进行综合抗震鉴定分析：', ''];
    lines.push('【第三章：基本信息】');
    lines.push('建筑: ' + b.name + ' | 位置: ' + b.location + ' | ' + b.year + '年建造 | ' + b.structType);
    lines.push('层数/面积: ' + b.floors + '层/' + b.area + '㎡ | 设防: ' + b.intensity + ' | 场地: ' + b.siteClass);
    lines.push('后续年限: ' + b.serviceLife + ' | 功能: ' + b.usage);
    lines.push('');
    lines.push('【第七章：各类构件详细检测数据（逐根建档）】');
    for (var k in COMPS) {
        var list = S.compLists[k];
        if (!list || !list.length) continue;
        lines.push(COMPS[k].name + '（共 ' + list.length + ' ' + COMPS[k].unit + '）:');
        for (var i = 0; i < list.length; i++) {
            var item = list[i];
            if (!isItemFilled(item)) { lines.push('  [' + item.label + ']: 未录入数据'); continue; }
            var parts = [item.label];
            var fields = COMP_FIELDS[k];
            for (var fi = 0; fi < fields.length; fi++) {
                var f = fields[fi];
                if (item.data[f.id]) parts.push(f.label + '=' + item.data[f.id]);
            }
            lines.push('  ' + parts.join('，'));
        }
        lines.push('');
    }
    lines.push('【第九章：抗震验算结果】');
    if (c.betaCI_list && c.betaCI_list.length > 0) {
        for (var fi2 = 0; fi2 < c.betaCI_list.length; fi2++) {
            var bk = c.betaCI_list[fi2];
            if (bk === null) continue;
            lines.push('  第' + (fi2+1) + '层 βci=' + bk.toFixed(3) + '  ' + (bk >= 1.0 ? '满足' : '不满足'));
        }
        lines.push('  薄弱层描述: ' + (c.weakDesc || '待补充'));
        lines.push('  综合结论: ' + (c.conclusion || '待补充'));
    } else {
        lines.push('  （尚未完成抗震验算）');
    }
    lines.push('');
    lines.push('【第十一章：耐久性数据】');
    // 构件级数据
    var compDurAI = gatherCompDurability();
    if (compDurAI.length > 0) {
        lines.push('【构件级耐久性检测】共' + compDurAI.length + '个构件：');
        for (var cai = 0; cai < compDurAI.length; cai++) {
            var cda = compDurAI[cai];
            lines.push('  - ' + cda.label + ': 碳化' + (cda.carbD||'—') + 'mm, Cl⁻' + (cda.chloride||'—') + '%, 锈蚀电位' + (cda.rustPot||'—') + 'mV, 评级' + cda.rating);
        }
    }
    lines.push('【全局综合】碳化: ' + d.carbonDepth + 'mm | 保护层: ' + d.protectionLayer + 'mm | 碳化速率: ' + d.carbonRate + 'mm/√年');
    lines.push('氯离子: ' + d.chloride + '% | 环境: ' + d.environment + ' | 推定剩余年限: ' + d.residualLife + '年');
    lines.push('冻融: ' + d.freezeCycles + '次/年 | 损伤: ' + d.freezeDamage);
    lines.push('推定剩余年限: ' + d.residualLife + '年 | 耐久等级: ' + d.durabilityLevel);
    lines.push('');
    lines.push('请提供: ①构件问题汇总（按类型） ②抗震验算复核意见 ③耐久性评定 ④安全隐患分级 ⑤具体加固措施（立即/中期/长期） ⑥综合结论');
    return lines.join('\n');
}

function copyRpt() {

}

function downloadRpt() {
    var txt = document.getElementById('rptBox').innerText;
    var a = document.createElement('a');
    a.href = 'data:text/plain;charset=utf-8,' + encodeURIComponent(txt);
    a.download = '抗震鉴定报告_' + S.building.name + '_' + Date.now() + '.txt';

/* ====================================================
   工具函数
==================================================== */
function v(id) { var el = document.getElementById(id); return el ? el.value : ''; }

function esc(s) {
    if (s === undefined || s === null) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// 转义用于 onclick 单引号字符串的参数（将 ' 转为 \'，确保 JS 字符串字面量安全）
function escJS(s) {
    if (s === undefined || s === null) return '';
    return String(s).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
}

function fld(labelText, inputHtml) {
    return '<div class="field"><label>' + labelText + '</label>' + inputHtml + '</div>';
}

function sel(id, options, currentVal) {
    var html = '<select id="' + id + '">';
    for (var i = 0; i < options.length; i++) {
        html += '<option' + (options[i] === currentVal ? ' selected' : '') + '>' + esc(options[i]) + '</option>';
    }
    return html + '</select>';
}

/* ====================================================
   设计文件处理函数
==================================================== */
function renderDesignFiles() {
    var files = S.designFiles || [];
    var html = '';
    for (var i = 0; i < files.length; i++) {
        var f = files[i];
        var icon = getFileIcon(f.type);
        html += '<div class="design-file-item">' +
            '<span class="file-icon">' + icon + '</span>' +
            '<span class="file-name" title="' + esc(f.name) + '">' + esc(f.name) + '</span>' +
            '<button class="file-remove" onclick="removeDesignFile(' + i + ')" title="删除">×</button>' +
        '</div>';
    }
    return html;
}

function getFileIcon(type) {
    if (!type) return '📄';
    type = type.toLowerCase();
    if (type.includes('pdf')) return '📕';
    if (type.includes('word') || type.includes('doc')) return '📘';
    if (type.includes('image') || type.includes('jpg') || type.includes('jpeg') || type.includes('png')) return '🖼️';
    return '📄';
}

function handleDesignFileUpload(input) {
    if (!input.files || input.files.length === 0) return;
    S.designFiles = S.designFiles || [];
    
    for (var i = 0; i < input.files.length; i++) {
        var file = input.files[i];
        (function(f) {
            var reader = new FileReader();
            reader.onload = function(e) {
                S.designFiles.push({
                    name: f.name,
                    type: f.type,
                    size: f.size,
                    data: e.target.result, // base64
                    uploadedAt: new Date().toISOString()
                });
                renderInfo(); // 刷新页面显示文件列表
            };
            reader.readAsDataURL(f);
        })(file);
    }
    input.value = ''; // 清空以便重复选择同一文件
}

function removeDesignFile(index) {
    if (S.designFiles) {
        S.designFiles.splice(index, 1);
        renderInfo();
    }
}

async function analyzeDesignFiles() {
    if (!S.designFiles || S.designFiles.length === 0) {
        alert('请先上传设计文件');
        return;
    }
    
    if (!checkAiConfigured()) return;
    
    var btn = document.getElementById('btnAnalyzeDesign');
    var status = document.getElementById('designAnalysisStatus');
    var resultDiv = document.getElementById('designAnalysisResult');
    var contentDiv = document.getElementById('designAnalysisContent');
    
    btn.disabled = true;
    btn.textContent = '⏳ AI 解析中...';
    status.textContent = '正在分析设计文件...';
    
    try {
        // 构建提示信息
        var fileList = S.designFiles.map(function(f, i) {
            return (i + 1) + '. ' + f.name + ' (' + f.type + ')';
        }).join('\n');
        
        var prompt = '请分析以下建筑结构设计文件，提取并整理关键的结构设计信息：\n\n' +
            '【上传的文件】\n' + fileList + '\n\n' +
            '请按以下格式输出：\n\n' +
            '## 1. 项目基本信息\n' +
            '- 建筑结构类型：\n' +
            '- 设计使用年限：\n' +
            '- 抗震设防烈度：\n' +
            '- 混凝土强度等级：\n' +
            '- 钢筋等级：\n\n' +
            '## 2. 主要构件设计信息\n' +
            '### 柱（框架柱）\n' +
            '- 典型截面尺寸：\n' +
            '- 纵筋配置：\n' +
            '- 箍筋配置：\n' +
            '- 混凝土强度：\n\n' +
            '### 梁（框架梁）\n' +
            '- 典型截面尺寸（宽×高）：\n' +
            '- 纵筋配置：\n' +
            '- 箍筋配置：\n' +
            '- 混凝土强度：\n\n' +
            '### 楼板\n' +
            '- 板厚：\n' +
            '- 配筋：\n' +
            '- 混凝土强度：\n\n' +
            '### 砖墙/砌体\n' +
            '- 墙体厚度：\n' +
            '- 砂浆强度：\n' +
            '- 砖强度：\n\n' +
            '## 3. 设计特殊说明\n' +
            '（任何特殊设计要求或需要注意的方面）\n\n' +
            '请根据文件内容尽可能详细填写，如果文件中没有相关信息，请标注"未找到"或"需现场确认"。';
        
        var response = await callAIWithPrompt(prompt);
        
        // 保存解析结果
        S.designAnalysis = response;
        
        // 显示结果
        contentDiv.innerHTML = '<strong>✅ AI 解析完成！</strong><br><br>' + esc(response).replace(/\n/g, '<br>');
        resultDiv.style.display = 'block';
        status.textContent = '✅ 解析完成，已保存到系统';
        
    } catch (err) {
        status.textContent = '❌ 解析失败：' + err.message;
        contentDiv.innerHTML = '<strong>❌ 解析失败</strong><br>' + esc(err.message);
        resultDiv.style.display = 'block';
    }
    
    btn.disabled = false;
    btn.textContent = '🤖 AI 解析文件';
}
